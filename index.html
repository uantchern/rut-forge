<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>i dont know what to say</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f6f8ee; /* Bright summer day, sunlit edge of a forest */
      overflow: hidden;
      font-family: 'Georgia', serif;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      cursor: crosshair;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: transparent !important;
    }
    
    #bg-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      /* GPU-accelerated stacking. Preferentially loops the GIF. Falls back to static JPG. Default gradient beneath all. */
      background-image: url('background.gif'), url('background.jpg'), linear-gradient(to bottom, #1c5aa8 0%, #76ade3 40%, #dceaf2 80%, #a8c797 100%);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
  </style>
</head>
<body>
  
  <div id="bg-container"></div>
  
  <script>
    // System State Architecture
    let state = 'A'; // A: Void
    
    let stars = [];
    let globalDots = [];
    let tapCount = 0;
    let absoluteTapCount = 0; // Tracks across the entire session to drive physical state colors
    
    let butterflyImg;
    let bPixels = []; // Array of structurally parsed hyper-realistic photographic points {x, y, col}
    
    function preload() {
        // Loads the absolute 100% realistic multi-colorful photograph natively overriding parametric maths
        butterflyImg = loadImage('butterfly_mask.png');
    }
    
    // Dynamically returns the current thematic palette based cleanly on the 10-click loop
    function getCurrentThemeColor() {
        let cycleNum = Math.floor(Math.max(0, absoluteTapCount - 1) / 10);
        let palettes = [
            color(20, 55, 90),   // Cycle 1: Deep Navy
            color(190, 45, 55),  // Cycle 2: Rich Crimson
            color(40, 130, 65),  // Cycle 3: Forest Green
            color(140, 30, 180), // Cycle 4: Deep Violet
            color(220, 110, 20), // Cycle 5: Autumn Golden
            color(30, 160, 190)  // Cycle 6: Vivid Cyan
        ];
        return palettes[cycleNum % palettes.length];
    }
    
    function setup() {
      createCanvas(windowWidth, windowHeight);
      
      // Parse the loaded high-definition image into raw actionable geometric dot data!
      butterflyImg.resize(800, 0); // Normalize macro sizing natively
      butterflyImg.loadPixels();
      
      let imgW = butterflyImg.width;
      let imgH = butterflyImg.height;
      let densityScale = 4; // Scan incrementally to produce a dense gorgeous dot matrix outline
      
      for (let x = 0; x < imgW; x += densityScale) {
          for (let y = 0; y < imgH; y += densityScale) {
              let idx = (x + y * imgW) * 4;
              let r = butterflyImg.pixels[idx];
              let g = butterflyImg.pixels[idx + 1];
              let b = butterflyImg.pixels[idx + 2];
              let a = butterflyImg.pixels[idx + 3];
              
              // Rely strictly on true pure PNG alpha transparency! Ignore RGB noise entirely
              if (a > 128) {
                  // Center the coordinates seamlessly globally around (0,0) explicitly natively
                  bPixels.push({
                      x: x - imgW/2,
                      y: y - imgH/2,
                      col: color(r, g, b)
                  });
              }
          }
      }
      
      // Initialize Golden floating magic spores (Spirited Away style)
      for (let i = 0; i < 120; i++) { 
        stars.push(new Star());
      }
    }
    
    function draw() {
      // Completely wipe the internal canvas buffer rendering the scene 100% physically transparent. 
      // This seamlessly allows the CSS hardware-accelerated GIF playing underneath the canvas to shine through!
      clear(); 
      
      // Apply a very slight atmospheric haze over the entire transparent canvas so the foreground pops perfectly
      let ctx = drawingContext;
      fill(240, 245, 238, 40);
      rect(0, 0, width, height);
      
      // State A: Summer Motes background drift
      for (let s of stars) {
        s.update();
        s.display();
      }
      
      // The Unified Particle State System!
      for (let i = globalDots.length - 1; i >= 0; i--) {
        let d = globalDots[i];
        d.update();
        d.display();
        if (d.alpha <= 0) {
            globalDots.splice(i, 1);
        }
      }
    }
    
    function mousePressed() {
      if (tapCount === 10) {
         tapCount = 0; 
         // System natively wipes loop integers but preserves dots actively fading in the air!
      }
      
      tapCount++;
      absoluteTapCount++; // Continuously drives the palette evolution uniformly
      
      if (tapCount === 5 || tapCount === 10) {
          // Command ALL dots natively waiting at the edges to rush inwards toward the cursor
          let scaleR = min(width, height) / butterflyImg.height * 0.85; // Fill viewport smoothly
          let activeDots = globalDots.filter(d => d.mode === 'WAIT');
          
          for (let i = 0; i < activeDots.length; i++) {
              let d = activeDots[i];
              
              // Swap abstract parametric line math natively with absolute realistic macro structural dots!
              let rp = random(bPixels); // Pull a random pixel from the hyper-realistic physical photo array
              
              let tx = rp.x * scaleR;
              let ty = rp.y * scaleR;
              
              if (tapCount === 5) {
                 // 50% formed, heavy noise injected explicitly scrambling the physical photographic form
                 tx += random(-55, 55);
                 ty += random(-55, 55);
              }
              // tapCount 10 mathematically resolves the image 100% cleanly without noise interference natively!
              
              d.homeTarget = createVector(mouseX + tx, mouseY + ty);
              d.mode = 'RETURN';
              d.timer = 0; // Starts the structural form countdown timer
              d.lerpSpeed = random(0.002, 0.0087); // Half sped AGAIN natively drifting seamlessly inward slowly
              
              // Reproduce "100% multi-colorful butterfly" implicitly by forcing the returning edge-dots to adopt the EXACT vibrant color properties mapped to the photography array!
              if (tapCount === 10) {
                  d.color = rp.col; 
              }
          }
      } else {
          // Clicks 1-4, 6-9: Chaos interaction!
          let spawnCount = Math.floor(random(130, 200));
          for (let i = 0; i < spawnCount; i++) {
              globalDots.push(new Dot(mouseX, mouseY, tapCount));
          }
      }
    }
    
    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
    
    // --- ENVIRONMENT RENDERERS --- //
    
    function drawGrass() {
        noFill();
        let windTime = frameCount * 0.018; 
        
        let layers = 6; // 6 planes of absolute photorealistic depth
        
        for (let l = 0; l < layers; l++) {
            let depthP = l / (layers - 1); // 0.0 to 1.0
            
            // Physics attributes per layer
            let strokeW = map(depthP, 0, 1, 0.8, 2.5); // Hair-thin back layers, robust front layers
            strokeWeight(strokeW);
            
            // Base shadow-to-light gradient across the spatial plains
            let baseR = map(depthP, 0, 1, 10, 80);
            let baseG = map(depthP, 0, 1, 25, 150);
            let baseB = map(depthP, 0, 1, 10, 35);
            let alpha = map(depthP, 0, 1, 160, 255);
            
            // Density of the actual blades per layer! Back layers are ultra-dense, front are slightly spread out
            let spacing = map(depthP, 0, 1, 2.0, 7.0);
            
            for (let x = -60; x < width + 60; x += spacing) { 
                let nSeed = x * 1.5 + l * 1000; 
                
                // Add jitter to the x position so it physically shatters any uniform column/row grid effect
                let actualX = x + map(noise(nSeed), 0, 1, -spacing, spacing);
                
                // Micro-color variations replicating individual blade biology
                let rVal = baseR + map(noise(nSeed + 10), 0, 1, -15, 30);
                let gVal = baseG + map(noise(nSeed + 20), 0, 1, -20, 45);
                let bVal = baseB + map(noise(nSeed + 30), 0, 1, -10, 15);
                stroke(rVal, gVal, bVal, alpha);
                
                // Height maps across both X spatial noise and Layer depth
                // Tallest grasses are natively generated in the front
                let hNoise = noise(actualX * 0.008, l * 0.5);
                let baseHeight = height * 0.08;
                let maxH = baseHeight + (l * height * 0.045);
                let ht = map(hNoise, 0, 1, baseHeight * 0.5, maxH);
                
                // Staggered wind propagation (gusts physically hit the front layers slightly delayed)
                let windStrength = noise(actualX * 0.003, windTime - l*0.05); 
                // Wind strongly affects taller grass exponentially
                let windBend = map(windStrength, 0, 1, -15, 60) * map(ht, 0, height*0.3, 0.4, 1.8);
                
                // Introduce severe biological droop (broken blades, heavy seed heads) exclusively to random mid/front blades
                let droopX = 0;
                let droopY = 0;
                if (l > 3 && noise(nSeed * 3) > 0.8) {
                    droopX = map(noise(nSeed * 4), 0, 1, 15, 60);
                    droopY = map(noise(nSeed * 5), 0, 1, 5, 25);
                    if (noise(nSeed * 6) > 0.5) droopX *= -1; // Randomly fall left or right
                }
                
                beginShape();
                vertex(actualX, height + 5); // anchor slightly beneath the canvas cut-off
                
                let cpY = height - (ht * 0.55);
                let tipX = actualX + windBend + droopX;
                let tipY = height - ht + droopY;
                
                quadraticVertex(actualX + (windBend * 0.3), cpY, tipX, tipY);
                endShape();
            }
        }
    }
    
    // --- PHYSICS & VISUAL CLASSES --- //
    
    class Star {
      constructor() {
        this.pos = createVector(random(width), random(height));
        this.nx = random(1000);
        this.size = random(3.0, 7.0); // Bigger, softer floating magic spores/motes
      }
      update() {
        // Drifting golden motes slowly rising in the updrafts (Slowed another 50% again)
        this.nx += 0.001;
        this.pos.x += map(noise(this.nx, frameCount * 0.01), 0, 1, -0.12, 0.12);
        this.pos.y -= random(0.06, 0.2); // Rising physics explicitly halved once more
        if (this.pos.y < 0) this.pos.y = height + 10;
      }
      display() {
        noStroke();
        let alpha = map(noise(this.nx), 0, 1, 10, 150);
        // Hyper-realistic optical lens bokeh / spore light blooming using native radial gradients
        let ctx = drawingContext;
        let grad = ctx.createRadialGradient(this.pos.x, this.pos.y, 0, this.pos.x, this.pos.y, this.size * 3.5);
        grad.addColorStop(0, `rgba(255, 255, 255, ${alpha/255})`); // Hot white optical core
        grad.addColorStop(0.2, `rgba(255, 230, 100, ${alpha/255 * 0.8})`); // Rich warm bloom ring
        grad.addColorStop(1, `rgba(255, 200, 50, 0)`); // Perfect smooth linear fade into transparency
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.pos.x, this.pos.y, this.size * 3.5, 0, TWO_PI);
        ctx.fill();
      }
    }
    
    class Dot {
        constructor(x, y, tapIndex) {
            this.origin = createVector(x, y);
            this.curr = createVector(x, y);
            
            // Explosive scatter physics outwards to the edges
            let explodeAng = random(TWO_PI);
            let explodeDist = Math.max(width, height) * 0.9;
            this.fleeTarget = createVector(x + cos(explodeAng)*explodeDist, y + sin(explodeAng)*explodeDist);
            this.homeTarget = null;
            
            this.mode = 'FLEE'; 
            this.alpha = 255;
            this.color = getCurrentThemeColor();
            this.timer = 0;
            this.size = random(1.5, 9.0); // Dots scatter globally in huge variety of random sizes
            
            this.lerpSpeed = random(0.0012, 0.006); // Extremely slowly drifting outwards halved natively AGAIN
            
            // Logic mapping the exact specified dropout probability bounds per distinct step block
            this.survivor = false;
            if (tapIndex <= 4) {
                this.survivor = random() > 0.50; // 50% wait at edges
            } else if (tapIndex >= 6 && tapIndex <= 9) {
                this.survivor = random() > 0.20; // 80% wait at edges
            }
            
            this.seed = random(1000);
            this.nx = random(100);
        }
        
        update() {
            if (this.mode === 'FLEE') {
                this.curr.x = lerp(this.curr.x, this.fleeTarget.x, this.lerpSpeed);
                this.curr.y = lerp(this.curr.y, this.fleeTarget.y, this.lerpSpeed);
                
                // Edge-reached detection
                let isAtEdge = this.curr.x < 5 || this.curr.x > width - 5 || this.curr.y < 5 || this.curr.y > height - 5;
                if (isAtEdge) {
                    if (this.survivor) {
                        this.mode = 'WAIT';
                    } else {
                        // Dot officially "disappears over the edge"
                        this.alpha -= 5; // Severely slowed localized dissolve cleanly wrapping past off-screen
                    }
                }
            } 
            else if (this.mode === 'WAIT') {
                // Suspended animation sitting quietly at the canvas edges waiting for dots or commands
                this.curr.x += random(-0.07, 0.07); // Shiver halved cleanly AGAIN
                this.curr.y += random(-0.07, 0.07);
            }
            else if (this.mode === 'RETURN') {
                // Swooping cleanly inward from edge boundaries directly back to the physical cursor geometry limits
                this.curr.x = lerp(this.curr.x, this.homeTarget.x, this.lerpSpeed);
                this.curr.y = lerp(this.curr.y, this.homeTarget.y, this.lerpSpeed);
                
                // Keep track of how long the shape has been geometrically held up visually
                this.timer += 0.0025; // Sped inherently held explicitly twice as visually long AGAIN!
                
                // Trigger natural dissolve or fluttering exit after ~1.5 seconds of holding structural bounds
                if (this.timer > 1.2) { 
                    if (tapCount === 10 || tapCount === 0) {
                        this.mode = 'FLUTTER'; // "flutters away and dissolves" on step 10 specifically
                    } else {
                        this.mode = 'DISSOLVE'; // "slowly dissolves" generally
                    }
                }
            }
            else if (this.mode === 'FLUTTER') {
                // Graceful sweeping wing-beats visually drifting upwards
                this.curr.x += map(noise(this.nx, frameCount * 0.05), 0, 1, -0.6, 0.6);
                this.curr.y -= random(0.12, 0.6); // Rising gravity inherently halved AGAIN
                this.nx += 0.025;
                this.alpha -= 0.2; // beautiful extended dissolve explicitly dragged linearly halved AGAIN
            }
            else if (this.mode === 'DISSOLVE') {
                this.alpha -= 0.35; // Natural localized linear evaporation completely halved natively AGAIN
                this.curr.x += random(-0.05, 0.05);
                this.curr.y += random(-0.05, 0.05);
            }
        }
        
        display() {
            noStroke();
            fill(red(this.color), green(this.color), blue(this.color), this.alpha);
            circle(this.curr.x, this.curr.y, this.size);
        }
    }
  </script>
</body>
</html>
