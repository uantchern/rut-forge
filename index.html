<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashley "Mei" Lin | Pediatric Check-In</title>
    <!-- Hosted at idontknowwhattosay.net -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F2EFE9;
            --text-dark: #2A2A2A;
            --mei-blue: #0ea5e9;
            --sporty-orange: #f59e0b;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --crisis-red: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .persona-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--mei-blue), var(--sporty-orange));
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(14, 165, 233, 0.3);
        }

        .persona-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .persona-status {
            font-size: 0.8rem;
            color: #666;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
        }

        .chat-container {
            flex-grow: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 1.05rem;
            line-height: 1.5;
            animation: fadeIn 0.4s ease forwards;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-mei {
            background: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .msg-user {
            background: var(--mei-blue);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.2);
        }

        .msg-system {
            background: rgba(239, 68, 68, 0.1);
            color: var(--crisis-red);
            align-self: center;
            text-align: center;
            font-size: 0.9rem;
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            max-width: 90%;
            margin: 10px 0;
        }

        .input-area {
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex;
            gap: 12px;
        }

        input {
            flex-grow: 1;
            padding: 16px 24px;
            border-radius: 30px;
            border: 1px solid #ddd;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s;
            background: white;
            outline: none;
        }

        input:focus {
            border-color: var(--mei-blue);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }

        button {
            background: var(--mei-blue);
            color: white;
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background: #0284c7;
        }
        
        .worry-box-ui {
            background: #2a2a2a;
            color: white;
            padding: 20px;
            border-radius: 16px;
            margin-top: 10px;
            text-align: center;
            border: 2px solid #ed1c24; /* Pepsi Red */
            position: relative;
            overflow: hidden;
        }

        .emoji-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            font-size: 2rem;
        }

        .emoji-selector span {
            cursor: pointer;
            transition: transform 0.2s;
        }

        .emoji-selector span:hover {
            transform: scale(1.3);
        }

        .start-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .start-btn {
            background: white;
            color: var(--mei-blue);
            padding: 16px 32px;
            font-size: 1.2rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

    </style>
</head>
<body>

    <div class="start-overlay" id="startOverlay">
        <button class="start-btn" onclick="startSession()">
            <span>Begin Check-In with Mei</span> 🌊
        </button>
    </div>

    <header class="header">
        <div class="persona-info">
            <div class="avatar">M</div>
            <div>
                <div class="persona-name">Ashley "Mei" Lin</div>
                <div class="persona-status"><span class="status-dot"></span> Online</div>
            </div>
        </div>
        <div style="font-size: 0.8rem; color: #888;">Clinical Companion Portal</div>
    </header>

    <div class="chat-container" id="chat">
        <!-- Chat messages will spawn here -->
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="How is your body feeling right now? Or type an emoji..." autocomplete="off">
        <button onclick="sendMessage()">→</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        
        let state = 0; // 0: Init, 1: Somatic check, 2: Worry Box, 3: Escalated

        const escalators = ["bridge", "jump", "stop the pain", "pain forever", "die", "hurt myself", "heavy", "queensboro"];

        const synth = window.speechSynthesis;
        let meiVoices = [];

        // Load voices
        synth.onvoiceschanged = () => {
            const allVoices = synth.getVoices();
            // Target premium/natural American female voices (Mac/Windows favorites)
            const preferredNames = ["Samantha", "Aria", "Google US English", "Zira", "Jenny", "Victoria"];
            
            meiVoices = allVoices.filter(v => v.lang.includes("en-US") && preferredNames.some(name => v.name.includes(name)));
            
            // Fallback to any generic US female voice
            if(meiVoices.length === 0) {
                meiVoices = allVoices.filter(v => v.lang.includes("en-US") && (v.name.includes("Female") || v.name.includes("Woman")));
            }
            // Final fallback to any US voice
            if(meiVoices.length === 0) {
                meiVoices = allVoices.filter(v => v.lang.includes("en-US"));
            }
        };

        function speak(text) {
            // strip simple HTML and emojis to make it sound natural
            const cleanText = text.replace(/<[^>]*>?/gm, '').replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '');
            const utterThis = new SpeechSynthesisUtterance(cleanText);
            
            // "Huskier, Calmer, Slower" cadence
            utterThis.rate = 0.9;  // Slower pace for calm therapy
            utterThis.pitch = 0.8; // Lower pitch for a huskier, more resonant tone
            
            if(meiVoices.length > 0) utterThis.voice = meiVoices[0]; // grab top matched voice
            synth.speak(utterThis);
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message msg-${sender}`;
            div.innerHTML = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;

            if(sender === 'mei') {
                speak(text);
            }
        }

        function startSession() {
            document.getElementById('startOverlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('startOverlay').style.display = 'none';
            }, 500);

            // Initialize Chat
            setTimeout(() => {
                addMessage("Hey there! Mei here. I'm just organizing the play-mats in my office right here in Green Bay, Queens. 🧩", "mei");
                setTimeout(() => {
                    addMessage("How is your body feeling right now? If you had to pick an emoji for your energy today, which one would it be?", "mei");
                }, 4000);
            }, 500);
        }

        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, "user");
            input.value = "";
            
            if (state === 3) return; // Locked in crisis

            // Check for escalation
            const lowerText = text.toLowerCase();
            const isCrisis = escalators.some(word => lowerText.includes(word));

            if (isCrisis) {
                state = 3;
                setTimeout(() => {
                    triggerCrisisProtocol();
                }, 800);
                return;
            }

            // Standard CBT Logic
            setTimeout(() => {
                if (state === 0) {
                    addMessage("I completely hear you. That makes a lot of sense. 🧘🏻‍♀️", "mei");
                    setTimeout(() => {
                        addMessage("Sometimes we carry heavy stuff, like a backpack full of rocks. Do you have a worry you want to drop off?", "mei");
                        addWorryBox();
                    }, 1200);
                    state = 1;
                } else if (state === 1) {
                    addMessage("Thanks for sharing that with me. It takes courage.", "mei");
                    state = 2;
                }
            }, 1000);
        }

        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });

        function addWorryBox() {
            const div = document.createElement('div');
            div.className = "message msg-mei";
            div.innerHTML = `
                Imagine the big red Pepsi-Cola sign in LIC. Below it is our giant digital Worry Box. Toss it in!
                <div class="worry-box-ui">
                    <strong>Drop a worry here:</strong>
                    <div class="emoji-selector">
                        <span onclick="tossEmoji('🎒')">🎒</span>
                        <span onclick="tossEmoji('🌧️')">🌧️</span>
                        <span onclick="tossEmoji('🌪️')">🌪️</span>
                        <span onclick="tossEmoji('🪫')">🪫</span>
                    </div>
                </div>
            `;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function tossEmoji(emoji) {
            addMessage(emoji, "user");
            setTimeout(() => {
                addMessage(`Whoosh! You threw the ${emoji} right into the digital box. It's stored away so you don't have to carry it tonight.`, "mei");
            }, 800);
        }

        function triggerCrisisProtocol() {
            addMessage("Thank you for being so brave and telling me exactly how heavy things feel right now. I care about you, and because you're hurting that much, we are going to press pause on our regular check-in.", "mei");
            
            setTimeout(() => {
                addMessage("<b>SYSTEM OVERRIDE: CLINICAL ESCALATION ENGAGED</b><br>Silent PagerDuty/Slack alert dispatched to Supervisor Esther Loh, NCMHCE.<br>988 Crisis Copilot module engaged.", "system");
                
                setTimeout(() => {
                    addMessage("You don't have to carry this alone. I've sent a quick message to Esther so she knows you're having a really tough time today. I am also connecting us to a specialist friend of mine who knows exactly how to help when things feel way too heavy to hold. They're joining our chat right now. Can you take one deep breath with me while they hop in?", "mei");
                    
                    setTimeout(() => {
                        addMessage("<b>988 COPILOT CONNECTED.</b><br>Live clinical counselor has entered the session. Handoff complete.", "system");
                        input.placeholder = "Type to speak with 988 counselor...";
                        document.querySelector('.persona-name').innerText = "988 Support Counselor";
                        document.querySelector('.persona-status').innerHTML = "<span class='status-dot' style='background:#ef4444'></span> Priority Crisis Line";
                        document.querySelector('.avatar').innerText = "988";
                        document.querySelector('.avatar').style.background = "linear-gradient(135deg, #ef4444, #f59e0b)";
                    }, 4000);

                }, 2000);
            }, 1000);
        }
    </script>

</body>
</html>
