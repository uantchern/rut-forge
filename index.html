<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>i dont know what to say</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0a0a0a;
      overflow: hidden;
      font-family: 'Georgia', serif;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      cursor: crosshair;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    
    #discovery-word {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(220, 240, 255, 0); /* Biolo-luminescent white */
      font-size: 28px;
      letter-spacing: 0.3em;
      pointer-events: none;
      transition: color 5s ease-in-out;
      text-shadow: 0 0 24px rgba(180, 230, 255, 0.5);
      font-style: italic;
    }
    
    .revealed {
      color: rgba(220, 240, 255, 0.8) !important;
    }
  </style>
</head>
<body>
  <div id="discovery-word">listen.</div>
  
  <script>
    // System State Architecture
    let state = 'A'; // A: Void, B: Stutter, D: Water Butterfly, E: Discovery
    // Note: State C (Ghostly Faint) is natively expressed via translucent canvas refreshing.
    
    let planktons = [];
    let bursts = [];
    let droplets = [];
    let tapCount = 0;
    let dTimer = 0;
    let dCenter;
    let dLines = [];
    
    const BGC = 10; // Dark Minimalism hex #0a0a0a roughly maps to rgb(10,10,10).
    
    function setup() {
      createCanvas(windowWidth, windowHeight);
      background(BGC);
      
      // Initialize Aimless Void planktons (Brownian motion particles)
      for (let i = 0; i < 200; i++) {
        planktons.push(new Plankton());
      }
    }
    
    function draw() {
      // State C: Persistence (The Ghostly Faint)
      // We do not clear the canvas entirely. A 5% opacity refresh translates to alpha ~13
      noStroke();
      fill(BGC, BGC, BGC, 13);
      rect(0, 0, width, height);
      
      // State A: Plankton background drift
      for (let p of planktons) {
        p.update();
        p.display();
      }
      
      // State B: The Stutter (Line Bursts)
      for (let i = bursts.length - 1; i >= 0; i--) {
        let b = bursts[i];
        b.update();
        b.display();
        if (b.isDead()) {
          bursts.splice(i, 1);
        }
      }
      
      // State D: The Water Butterfly (Coalescence & Evaporation)
      if (state === 'D') {
        dTimer++;
        if (dTimer < 300) {
          // Draw structural lines that "sweat" the droplets
          for (let l of dLines) {
            let fade = 1;
            if (dTimer > 250) fade = map(dTimer, 250, 300, 1, 0); // fade out right before evaporation
            stroke(200, 230, 255, l.alpha * fade);
            strokeWeight(0.5); // thin like original lines
            // Hand-drawn jitter for the sweating lines
            let jx = map(noise(frameCount * 0.1, l.angle), 0, 1, -1, 1);
            let jy = map(noise(frameCount * 0.1, l.angle + 100), 0, 1, -1, 1);
            line(dCenter.x, dCenter.y, l.end.x + jx, l.end.y + jy);
          }
          
          // Lines "sweat" water droplets coalescing into a shape
          for (let d of droplets) {
            d.update();
            d.display();
          }
        } else if (dTimer === 300) {
          // The Fail: Evaporation trigger. Disappointment of a fleeting glimmer.
          for (let d of droplets) {
            d.triggerEvaporate();
          }
        } else if (dTimer > 300) {
          // Visualizing vapor evaporation
          for (let i = droplets.length - 1; i >= 0; i--) {
            let d = droplets[i];
            d.updateEvaporate();
            d.display();
            if (d.alpha <= 0) {
              droplets.splice(i, 1);
            }
          }
          
          if (droplets.length === 0 && state !== 'E') {
            transitionToStateE();
          }
        }
      }
    }
    
    function mousePressed() {
      if (state === 'E' || state === 'D') return; // lockout interactions during cinematic finale
      
      tapCount++;
      
      if (tapCount < 4) {
        // State B: The First Tap & Stutter lines
        bursts.push(new Burst(mouseX, mouseY));
      } else if (tapCount === 4) {
        // State D: Coalescence Trigger
        state = 'D';
        dTimer = 0;
        initButterfly(mouseX, mouseY);
      }
    }
    
    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      background(BGC);
    }
    
    function transitionToStateE() {
      // State E: Discovery (The Turning Point)
      state = 'E';
      document.getElementById('discovery-word').classList.add('revealed');
    }
    
    // --- PHYSICS & VISUAL CLASSES --- //
    
    class Plankton {
      constructor() {
        this.pos = createVector(random(width), random(height));
        this.nx = random(1000);
        this.ny = random(2000);
        this.size = random(0.5, 2.5);
      }
      update() {
        // Brownian motion combined with Taoist fluidity (Perlin noise drift)
        let vx = map(noise(this.nx), 0, 1, -0.5, 0.5);
        let vy = map(noise(this.ny), 0, 1, -0.5, 0.5);
        this.pos.x += vx + random(-0.2, 0.2);
        this.pos.y += vy + random(-0.2, 0.2);
        this.nx += 0.005;
        this.ny += 0.005;
        
        // Wrap screen edges
        if (this.pos.x < 0) this.pos.x = width;
        if (this.pos.x > width) this.pos.x = 0;
        if (this.pos.y < 0) this.pos.y = height;
        if (this.pos.y > height) this.pos.y = 0;
      }
      display() {
        noStroke();
        // Faint glowing, bioluminescent presence
        let alpha = map(noise(this.nx * 2), 0, 1, 20, 100);
        fill(180, 230, 255, alpha);
        circle(this.pos.x, this.pos.y, this.size);
      }
    }
    
    class Burst {
        constructor(x, y) {
            this.origin = createVector(x, y);
            this.particles = [];
            this.timer = 0;
            this.lifeTime = random(80, 130);
            
            let numLines = Math.floor(random(25, 45)); // dense like the starburst from older versions
            let baseAngle = random(TWO_PI);
            
            // Intention: Form a starburst of lines radiating outward, aggressively trembling
            for(let i = 0; i < numLines; i++) {
                let angle = baseAngle + (i * TWO_PI / numLines) + random(-0.2, 0.2);
                let len = random(30, 240); // highly variable lengths matching the iconic "lined" burst
                let tOffset = p5.Vector.fromAngle(angle).mult(len);
                this.particles.push({
                    curr: createVector(x, y),
                    tOffset: tOffset,
                    seed: random(1000),
                    dissolved: false,
                    vx: 0,
                    vy: 0
                });
            }
        }
        update() {
            this.timer++;
            let progress = this.timer / this.lifeTime;
            let collapseThreshold = random(0.6, 0.8); // Defines the breaking limit
            
            for(let p of this.particles) {
                if (progress < collapseThreshold) {
                    // Stutter physics: trying desperately to form the intended shape
                    let target = p5.Vector.add(this.origin, p.tOffset);
                    let lerpAmt = 0.04;
                    p.curr.x = lerp(p.curr.x, target.x, lerpAmt);
                    p.curr.y = lerp(p.curr.y, target.y, lerpAmt);
                    
                    // Tremor noise reflecting the 'struggle'
                    let intensity = map(progress, 0, collapseThreshold, 0.5, 6);
                    let tx = map(noise(p.seed, frameCount * 0.15), 0, 1, -1, 1) * intensity;
                    let ty = map(noise(p.seed + 50, frameCount * 0.15), 0, 1, -1, 1) * intensity;
                    
                    p.curr.x += tx;
                    p.curr.y += ty;
                } else {
                    // Dissolve / Collapse (A thought that fizzles out completely)
                    if (!p.dissolved) {
                        p.dissolved = true;
                        p.vx = random(-3, 3);
                        p.vy = random(-1, 5); // Fall and scatter abruptly
                    }
                    p.curr.x += p.vx + random(-1, 1);
                    p.curr.y += p.vy + random(-1, 1);
                    p.vy += 0.1; // mild gravity pulling down the failures
                }
            }
        }
        display() {
            let progress = this.timer / this.lifeTime;
            let alpha = 200;
            if (progress >= 0.7) {
                alpha = map(progress, 0.7, 1.0, 200, 0); // Fade into the ghostly landscape
            }
            
            for(let p of this.particles) {
                // Bring back the crisp, hyper-starburst "lined" aesthetic perfectly!
                stroke(220, 240, 255, alpha * 0.6); // slightly translucent straight lines
                strokeWeight(0.8); // very thin, elegant rays
                line(this.origin.x, this.origin.y, p.curr.x, p.curr.y);
                
                // Point tip showing the struggle
                noStroke();
                fill(255, 255, 255, alpha);
                circle(p.curr.x, p.curr.y, 2.5);
            }
        }
        isDead() {
            return this.timer >= this.lifeTime;
        }
    }
    
    function initButterfly(cx, cy) {
        dCenter = createVector(cx, cy);
        
        // Form the persistent structure of lines that will sweat the droplets
        for(let i=0; i<50; i++) {
            let angle = random(TWO_PI);
            let len = random(40, 260);
            dLines.push({
                angle: angle,
                end: p5.Vector.add(dCenter, p5.Vector.fromAngle(angle).mult(len)),
                alpha: random(30, 150)
            });
        }
        
        let numDrops = 300;
        for (let i = 0; i < numDrops; i++) {
            droplets.push(new Droplet(cx, cy));
        }
    }
    
    class Droplet {
        constructor(cx, cy) {
            this.origin = createVector(cx, cy);
            this.curr = createVector(cx + random(-20, 20), cy + random(-20, 20)); // "sweat" outward initially
            this.seed = random(1000);
            this.alpha = random(40, 180);
            this.size = random(2, 5);
            
            // Generate coordinates along a mathematical Parametric Butterfly Curve
            let t = random(0, 12 * PI);
            let e = exp(cos(t));
            let s = pow(sin(t/12), 5);
            let x = sin(t) * (e - 2*cos(4*t) - s);
            let y = -cos(t) * (e - 2*cos(4*t) - s); // flip upright intentionally negative
            
            let scaleFact = random(12, 18);
            this.tOffset = createVector(x * scaleFact, y * scaleFact);
            this.vp = createVector(0,0);
        }
        update() {
            // Fluidly move towards butterfly shape parametric targets
            let breath = map(sin(frameCount * 0.03 + this.seed), -1, 1, 0.9, 1.1);
            let targetOffset = p5.Vector.mult(this.tOffset, breath);
            let target = p5.Vector.add(this.origin, targetOffset);
            
            this.curr.x = lerp(this.curr.x, target.x, 0.015);
            this.curr.y = lerp(this.curr.y, target.y, 0.015);
            
            // Taoist Fluidity non-resistant offset
            this.curr.x += map(noise(this.seed, frameCount * 0.01), 0, 1, -1, 1);
            this.curr.y += map(noise(this.seed + 200, frameCount * 0.01), 0, 1, -1, 1);
        }
        display() {
            noStroke();
            fill(180, 230, 255, this.alpha);
            circle(this.curr.x, this.curr.y, this.size);
        }
        triggerEvaporate() {
            // Initiate phase transition from fluid to vapor
            let angle = random(TWO_PI);
            let force = random(1, 5);
            this.vp = p5.Vector.fromAngle(angle).mult(force);
            this.vp.y -= random(2, 5); // strongly pulls up like evaporating vapor
        }
        updateEvaporate() {
            this.curr.add(this.vp);
            this.vp.y -= 0.05; // accelerates upward
            this.curr.x += random(-1, 1);
            this.curr.y += random(-1, 1);
            
            this.alpha -= 1.5;
            this.size = lerp(this.size, 15, 0.03); // gracefully expand into smoke
        }
    }
  </script>
</body>
</html>
