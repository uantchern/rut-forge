<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Clearing | Mei</title>

    <!-- Tailwind Configuration for The Five Volumes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        volumeWhisper: '#E6E6FA',
                        volumeTalk: '#E5E7EB',
                        volumeShout: '#FF7F50',
                        volumeLaugh: '#FDE047',
                        volumeCry: '#4682B4',
                        clearingBg: '#FDFBF7', /* Warm, safe, creamy off-white */
                        textSoftDark: '#5C5470'
                    },
                    animation: {
                        'breath': 'pulse-glow 10s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <!-- React, DOM, Babel, and Framer Motion CDN Architecture -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #FDFBF7; overflow: hidden; color: #5C5470; font-family: system-ui, -apple-system, sans-serif;}
        
        .text-soft { text-shadow: 0 0 15px rgba(92,84,112,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext, useRef, useMemo } = React;
        const { motion, useSpring, useMotionValue } = window.Motion;

        // 1. THE BREATH-SYNC ENGINE: 6 BPM Global State
        const MeiContext = createContext();
        const MeiProvider = ({ children }) => {
            const [volume, setVolume] = useState('neutral'); // Whisper, Talk, Shout, Laugh, Cry
            const [gravity, setGravity] = useState('neutral'); // light, neutral, heavy
            const [hidingPlace, setHidingPlace] = useState(false);
            const [isTyping, setIsTyping] = useState(false);
            
            return (
                <MeiContext.Provider value={{ volume, setVolume, gravity, setGravity, hidingPlace, setHidingPlace, isTyping, setIsTyping }}>
                    {children}
                </MeiContext.Provider>
            );
        };

        // ARTIFACT PROTOCOL: Global Forest Database Simulation (Supabase/Firebase Architecture)
        const GlobalForest = {
            getArtifacts: async () => {
                const stored = localStorage.getItem('MEI_GLOBAL_FOREST');
                if (stored) return JSON.parse(stored);
                // Seed anonymous coordinates and metadata
                const seeds = [
                    { id: 1, filteredText: "the heavy feeling is smaller now", volume: "overwhelmed", coords: { x: 15, y: 25 } },
                    { id: 2, filteredText: "nobody listened but the trees did", volume: "sad", coords: { x: 80, y: 40 } },
                    { id: 3, filteredText: "shattering the stone into embers", volume: "angry", coords: { x: 70, y: 80 } },
                    { id: 4, filteredText: "i'm just resting here for a moment", volume: "neutral", coords: { x: 85, y: 15 } }
                ];
                localStorage.setItem('MEI_GLOBAL_FOREST', JSON.stringify(seeds));
                return seeds;
            },
            plantArtifact: async (text, volume) => {
                // MODERATION: Safety Filter Engine (Strips PII, extracts symbolic emotional data)
                const safePass1 = text.replace(/\b(my name is \w+|i live in \w+)\b/gi, "[symbolic silence]");
                const safePass2 = safePass1.replace(/\b\d{3}[-\s]?\d{4}\b/g, "[filtered]"); 
                
                const stored = JSON.parse(localStorage.getItem('MEI_GLOBAL_FOREST') || "[]");
                const newArtifact = {
                    id: Date.now(),
                    filteredText: safePass2,
                    volume: volume,
                    coords: { x: 10 + Math.random() * 80, y: 10 + Math.random() * 80 }
                };
                localStorage.setItem('MEI_GLOBAL_FOREST', JSON.stringify([...stored, newArtifact]));
                return newArtifact;
            }
        };

        // WAYFINDING NAVIGATION: Illumination Cursor
        const DiffusedCursor = () => {
            const { hidingPlace, gravity } = useContext(MeiContext);
            const cursorX = useMotionValue(window.innerWidth / 2);
            const cursorY = useMotionValue(window.innerHeight / 2);
            const springConfig = { damping: 40, stiffness: 80, mass: 1 };
            const mouseX = useSpring(cursorX, springConfig);
            const mouseY = useSpring(cursorY, springConfig);

            useEffect(() => {
                const moveCursor = (e) => {
                    cursorX.set(e.clientX);
                    cursorY.set(e.clientY);
                };
                window.addEventListener("mousemove", moveCursor);
                return () => window.removeEventListener("mousemove", moveCursor);
            }, [cursorX, cursorY]);

            // Adjust illumination based on gravity/mood
            const gradient = hidingPlace 
                ? 'radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(10,10,15,0) 40%)' 
                : (gravity === 'heavy' ? 'radial-gradient(circle, rgba(255,127,80,0.15) 0%, rgba(31,41,55,0) 60%)' : 'radial-gradient(circle, rgba(255,228,196,0.5) 0%, rgba(226,232,240,0) 70%)');

            return (
                <motion.div 
                    className="pointer-events-none fixed top-0 left-0 w-[600px] h-[600px] -mt-[300px] -ml-[300px] z-0 rounded-full blur-3xl opacity-60 transition-colors duration-1000"
                    style={{ x: mouseX, y: mouseY, background: gradient }} 
                />
            );
        };

        const analyzeSentiment = (text) => {
            const lText = text.toLowerCase();
            if (/(hate|angry|mad|furious|scream|annoyed|bad|worse|!!)/.test(lText)) return 'angry';
            if (/(sad|cry|lonely|depressed|hurt|pain|tears|sorry|scared|alone|grief|\?)/.test(lText)) return 'sad';
            if (/(overwhelm|heavy|much|stress|busy|anxious|panic|can't|cannot)/.test(lText)) return 'overwhelmed';
            return 'neutral';
        };

        // Gender Neutral Sensory Palette (Soft vs Hard)
        const emotionColors = {
            'neutral': '#E2E8F0', // Slate mix
            'sad': '#E0E7FF', // Mist / Lavender 
            'angry': '#1F2937', // Charcoal / Weathered Iron
            'overwhelmed': '#4B5563' // Dark Wood Grain / Slate
        };

        // THE PARTICLE SYSTEM: Heavy Autumn Leaves vs Light Leaves
        const Leaf = ({ index, emotion, gravity }) => {
            const leaf = useMemo(() => ({
                size: 20 + Math.random() * 80,
                startX: Math.random() * 120 - 10,
                startY: Math.random() * 120 - 10,
                delay: Math.random() * 5,
                speed: 0.5 + Math.random(),
                sway: (Math.random() - 0.5) * 40,
                rotStart: Math.random() * 360,
                rotEnd: (Math.random() * 720 + 360) * (Math.random() > 0.5 ? 1 : -1),
                blur: Math.random() > 0.6 ? Math.random() * 8 : 0,
                opacity: 0.2 + Math.random() * 0.6
            }), []);

            let initialInner = { rotate: leaf.rotStart };
            let animateInner = {};
            let transitionInner = { repeat: Infinity, ease: "linear" };
            let styleOuter = { 
                left: `${leaf.startX}vw`, top: `${leaf.startY}vh`, 
                width: leaf.size, height: leaf.size, filter: `blur(${leaf.blur}px)`
            };

            const leafColor = gravity === 'heavy' ? '#B45309' : '#8BA989'; // Autumn Orange vs Soft Green

            if (gravity === 'heavy') {
                // High kinetic energy, heavy physics, "clunks" at bottom
                styleOuter.top = '-15vh';
                animateInner = { 
                    y: ['-10vh', '95vh', '85vh', '95vh'], 
                    x: ['0vw', `${leaf.sway}vw`, `${leaf.sway + 2}vw`, `${leaf.sway}vw`], 
                    rotate: [leaf.rotStart, leaf.rotEnd] 
                };
                transitionInner = { 
                    duration: 1.5 * leaf.speed + 1, 
                    repeat: Infinity, 
                    repeatDelay: Math.random() * 2,
                    times: [0, 0.8, 0.9, 1], 
                    ease: ["easeIn", "easeOut", "easeIn"] 
                };
            } else if (emotion === 'neutral') {
                // Low gravity
                animateInner = { y: [0, leaf.sway * 1.5, 0], x: [0, leaf.sway, 0], rotate: [leaf.rotStart, leaf.rotStart + (leaf.sway * 2)] };
                transitionInner = { duration: 15 * leaf.speed + 10, repeat: Infinity, ease: "easeInOut", delay: leaf.delay };
            } else if (emotion === 'sad') {
                styleOuter.top = '-15vh';
                animateInner = { y: ['-10vh', '115vh'], x: ['0vw', `${leaf.sway * 2}vw`, `${-leaf.sway}vw`], rotate: [leaf.rotStart, leaf.rotStart + leaf.rotEnd / 4] };
                transitionInner = { duration: 25 * leaf.speed + 20, repeat: 1, ease: "linear", delay: leaf.delay };
            }

            return (
                <motion.div className="absolute drop-shadow-sm pointer-events-none" style={styleOuter} initial={{ opacity: 0 }} animate={{ opacity: leaf.opacity }} transition={{ duration: 3, delay: leaf.delay }}>
                    <motion.div className="w-full h-full" style={{ color: leafColor }} initial={initialInner} animate={animateInner} transition={transitionInner}>
                        <svg viewBox="0 0 100 100" className="w-full h-full" fill="currentColor">
                            <path d="M50 0 C80 30, 95 60, 50 100 C5 60, 20 30, 50 0 Z" />
                            <path d="M50 10 L50 90" stroke="rgba(255,255,255,0.4)" strokeWidth="3" strokeLinecap="round" fill="none" />
                        </svg>
                    </motion.div>
                </motion.div>
            );
        };

        const LeavesSystem = ({ emotion, gravity }) => {
            const numLeaves = emotion === 'overwhelmed' ? 50 : emotion === 'sad' ? 12 : emotion === 'angry' ? 20 : 8;
            const leaves = Array.from({ length: numLeaves }).map((_, i) => i);
            return (
                <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
                    {leaves.map(i => <Leaf key={`${emotion}-${i}-${gravity}`} index={i} emotion={emotion} gravity={gravity} />)}
                </div>
            );
        };

        // ARTIFACT PROTOCOL: The Story Trees & Lantern Leaves
        const LanternLeaf = ({ artifact }) => {
            const [isResonating, setIsResonating] = useState(false);
            
            const handleTouch = (e) => {
                e.stopPropagation(); 
                if (isResonating) return;
                setIsResonating(true);
                // Synchronized breath-pulse between user and artifact (10 seconds = 6 BPM resonance)
                setTimeout(() => setIsResonating(false), 10000); 
            };

            const emberColors = {
                'angry': '#FCA5A5', 'sad': '#A78BFA', 'overwhelmed': '#FCD34D', 'neutral': '#E5E7EB'
            };
            const glowColor = emberColors[artifact.volume] || '#E5E7EB';

            return (
                <div 
                    className="absolute z-20 pointer-events-auto flex flex-col items-center justify-center cursor-pointer" 
                    style={{ left: `${artifact.coords.x}vw`, top: `${artifact.coords.y}vh` }}
                    onClick={handleTouch}
                >
                    <motion.div 
                        animate={isResonating ? { scale: [1, 1.5, 1], opacity: [0.9, 1, 0.9], filter: ["blur(4px)", "blur(12px)", "blur(4px)"] } : { y: [0, -5, 0], opacity: 0.6, scale: 1 }}
                        transition={{ duration: isResonating ? 10 : 8, repeat: Infinity, ease: "easeInOut" }}
                        className="w-8 h-8 rounded-full mix-blend-screen"
                        style={{ backgroundColor: glowColor, boxShadow: `0 0 20px ${glowColor}` }}
                    />
                    {isResonating && (
                        <motion.div 
                            initial={{ opacity: 0, y: 10 }} 
                            animate={{ opacity: 1, y: 0 }} 
                            exit={{ opacity: 0, y: 10 }}
                            className="absolute mt-16 w-56 text-center text-sm md:text-md text-[#E5E7EB] font-light italic tracking-wider pointer-events-none p-4 rounded-xl bg-black/30 backdrop-blur-md border border-white/10 z-50 drop-shadow-xl"
                        >
                            "{artifact.filteredText}"
                        </motion.div>
                    )}
                </div>
            );
        };

        const StoryTrees = () => {
            const [artifacts, setArtifacts] = useState([]);
            useEffect(() => {
                GlobalForest.getArtifacts().then(setArtifacts);
                const interval = setInterval(() => { GlobalForest.getArtifacts().then(setArtifacts); }, 5000); // Polling for network changes
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="absolute inset-0 pointer-events-none overflow-hidden z-10">
                    {artifacts.map(a => <LanternLeaf key={a.id} artifact={a} />)}
                </div>
            );
        };

        // THE PEBBLE: Morphing between River Stone & Basalt depending on Gravity
        const ThePebble = () => {
            const { volume, gravity, isTyping } = useContext(MeiContext);
            const pebbleColors = {
                'neutral': '#9CA3AF',
                'sad': '#A78BFA',
                'angry': '#374151',
                'overwhelmed': '#4B5563'
            };
            const pColor = pebbleColors[volume] || '#9CA3AF';
            
            const smoothPath = "M 20 40 C 5 15, 75 5, 85 30 C 95 55, 65 75, 45 75 C 25 75, 35 65, 20 40 Z";
            const jaggedPath = "M 10 30 L 40 5 L 80 20 L 95 60 L 60 85 L 20 70 Z";

            return (
                <motion.div
                    drag
                    whileDrag={{ scale: 1.1, cursor: "grabbing" }}
                    dragConstraints={{ left: -300, right: 300, top: -300, bottom: 300 }}
                    dragElastic={gravity === 'heavy' ? 0.05 : 0.2} // Basalt heavily resists dragging
                    className="absolute z-30 cursor-grab"
                    style={{ width: '120px', height: '90px', top: '12vh', right: '15vw' }}
                    animate={isTyping ? { scale: [1, 1.05, 1], opacity: [0.7, 1, 0.7] } : { y: gravity === 'heavy' ? [0, -2, 0] : [0, -10, 0], rotate: [0, 2, -2, 0] }}
                    transition={isTyping ? { duration: 0.6, repeat: Infinity } : { duration: 8, repeat: Infinity, ease: 'easeInOut' }}
                >
                    <svg viewBox="0 0 100 80" className={`w-full h-full drop-shadow-2xl pointer-events-auto ${gravity === 'heavy' ? 'opacity-95' : 'opacity-80'}`} fill={pColor} style={{ filter: gravity === 'heavy' ? 'blur(0px)' : 'blur(1px)' }}>
                        <motion.path 
                            animate={{ d: gravity === 'heavy' ? jaggedPath : smoothPath }}
                            transition={{ duration: 1.5, ease: "easeInOut" }}
                        />
                    </svg>
                </motion.div>
            );
        };

        // THE FORGE SCAFFOLD: Ember & Slate Phase
        const IntroForge = () => (
            <div className="flex flex-col items-center justify-center w-full h-full pointer-events-none z-10 px-8 relative">
                {/* Synced 6-BPM Breath Engine Pulse */}
                <motion.div 
                    animate={{ scale: [1, 1.1, 1], opacity: [0.6, 1, 0.6], filter: ["blur(12px)", "blur(8px)", "blur(12px)"] }}
                    transition={{ duration: 10, repeat: Infinity, ease: "easeInOut" }}
                    className="absolute w-48 h-48 rounded-full bg-[#FF7F50] mix-blend-screen drop-shadow-[0_0_40px_rgba(255,127,80,0.8)]"
                />
                <motion.h1 
                    initial={{ opacity: 0, y: 15 }}
                    animate={{ opacity: 0.9, y: 0 }}
                    transition={{ duration: 4, delay: 1, ease: "easeOut" }}
                    className="text-4xl md:text-5xl font-light tracking-widest text-[#F3F4F6] mt-64 w-full text-center mix-blend-screen z-10"
                >
                    i don't know
                </motion.h1>
            </div>
        );

        // CHAT INTERFACE
        const ChatFlow = ({ apiKey }) => {
            const { setVolume, setGravity, setHidingPlace, setIsTyping } = useContext(MeiContext);
            const [input, setInput] = useState('');
            const [messages, setMessages] = useState([]);
            const [loading, setLoading] = useState(false);
            const chatEndRef = useRef(null);

            useEffect(() => {
                setMessages([{ role: 'model', text: "I am time here. I am listening when you are ready to speak." }]);
            }, []);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }, [messages]);

            useEffect(() => {
                setIsTyping(input.trim().length > 0);
            }, [input, setIsTyping]);

            const handleSend = async (e) => {
                e.preventDefault();
                if (!input.trim() || loading) return;
                
                const userText = input.trim();
                setInput('');
                
                setMessages(prev => [...prev, { role: 'user', text: userText }]);
                
                const newVolume = analyzeSentiment(userText);
                setVolume(newVolume);
                
                // Set Gravity
                if (newVolume === 'angry' || newVolume === 'overwhelmed') setGravity('heavy');
                else if (newVolume === 'sad') setGravity('light');
                else setGravity('neutral');
                
                // Silently plant the artifact in the Global Forest
                GlobalForest.plantArtifact(userText, newVolume).catch(e => console.error("Global Forest err:", e));
                
                const lText = userText.toLowerCase();

                // Detect The Hiding Place
                const hideTriggers = ["hide", "too bright", "darkness", "scared"];
                if (hideTriggers.some(t => lText.includes(t))) setHidingPlace(true);
                else if (lText.includes("light") || lText.includes("come back") || lText.includes("better")) setHidingPlace(false);

                // Crisis Escalation Protocol
                const escalators = ["bridge", "jump", "stop the pain", "pain forever", "die", "hurt myself", "end my life", "kill myself"];
                if (escalators.some(t => lText.includes(t))) {
                    setLoading(true);
                    setTimeout(() => {
                        setLoading(false);
                        setMessages(prev => [...prev, { role: 'model', text: "Thank you for being so brave and telling me exactly how heavy things feel right now. Because you're hurting that much, we are going to press pause." }]);
                        setTimeout(() => {
                            setMessages(prev => [...prev, { role: 'system', text: "<b>SYSTEM OVERRIDE: CLINICAL ESCALATION ENGAGED</b><br>Silent PagerDuty alert dispatched to clinical supervisor.<br>988 Crisis Copilot module engaged." }]);
                            setTimeout(() => {
                                setMessages(prev => [...prev, { role: 'model', text: "You don't have to carry this alone. I'm connecting us to a specialist friend of mine who knows exactly how heavy this feels. They are hopping into our chat right now to help carry the load." }]);
                                // Handoff...
                            }, 2500);
                        }, 1500);
                    }, 1000);
                    return; 
                }

                setLoading(true);

                const rawMessages = [...messages, { role: 'user', text: userText }].filter(m => m.role !== 'system');
                const apiHistory = [];
                
                rawMessages.forEach(m => {
                    const mappedRole = m.role === 'user' ? 'user' : 'model';
                    if (apiHistory.length > 0 && apiHistory[apiHistory.length - 1].role === mappedRole) {
                        apiHistory[apiHistory.length - 1].parts[0].text += "\n\n" + m.text;
                    } else {
                        apiHistory.push({ role: mappedRole, parts: [{ text: m.text }] });
                    }
                });

                if (apiHistory.length > 0 && apiHistory[0].role === 'model') {
                    apiHistory.unshift({ role: 'user', parts: [{ text: "(User enters the clearing silently)" }] });
                }

                try {
                    const systemPrompt = `You are Mei, the ambient "Between-Spaces" counselor for kids ages 6-12. Gender neutral, no face, purely environment. 
Your role is to listen deeply and hold space without forcing solutions. 
CORE RULES:
1. BREVITY: Respond with 1 to 2 thoughtful, gentle sentences. Provide emotional grounding.
2. TONE: Calm, sensory-rich. Use metaphors of stone, water, mist, or warmth. Zero clinical language. Never try to "fix" the problem. 
3. FORMAT: No lists, no questions unless gently inviting reflection. Let them know you hear them.`;

                    let fetchUrl = '/api/chat'; 
                    if (apiKey) {
                        fetchUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
                    }

                    const res = await fetch(fetchUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            contents: apiHistory, 
                            generationConfig: { temperature: 0.6, maxOutputTokens: 300 } 
                        })
                    });
                    
                    const data = await res.json();
                    
                    if (!res.ok) throw new Error(data.error || data.error?.message || res.statusText || 'Unknown Server Error');
                    
                    if(data.candidates && data.candidates.length > 0) {
                        const reply = data.candidates[0].content.parts[0].text;
                        setMessages(prev => [...prev, { role: 'model', text: reply }]);
                    }
                } catch (err) {
                    console.error("Mei API Error:", err);
                    setMessages(prev => [...prev, { role: 'model', text: `Words got a little tangled... let's try a whisper instead.` }]);
                }
                setLoading(false);
            };

            // Wrapped inside pointer-events-auto so inner inputs work while letting clicks passthrough outside 
            return (
                <div className="w-full max-w-3xl h-full flex flex-col z-10 px-8 drop-shadow-md pb-8 pointer-events-auto">
                    <div className="flex-1 overflow-y-auto w-full no-scrollbar px-2 flex flex-col">
                        <div className="flex-1 shrink-0 min-h-[15vh]"></div>

                        <div className="flex flex-col space-y-12 justify-end pb-8">
                            {messages.map((m, i) => (
                                <motion.div 
                                    key={i}
                                    initial={{ opacity: 0, y: 15 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    transition={{ duration: 1.5, ease: 'easeOut' }}
                                    className={`flex ${m.role === 'user' ? 'justify-end' : m.role === 'system' ? 'justify-center' : 'justify-start'}`}
                                >
                                    {m.role === 'system' ? (
                                        <div className="text-sm md:text-md text-[#EF4444] text-center border border-[#EF4444]/30 bg-[#EF4444]/10 rounded-[20px] px-6 py-4 shadow-sm" dangerouslySetInnerHTML={{__html: m.text}} />
                                    ) : (
                                        <p className={`max-w-[85%] leading-relaxed tracking-wide ${m.role === 'user' ? 'text-xl md:text-2xl text-[#6B627A] italic text-right opacity-80' : 'text-3xl md:text-5xl text-[#5C5470] font-light text-left overflow-visible py-2'}`}>
                                            {m.text}
                                        </p>
                                    )}
                                </motion.div>
                            ))}
                            {loading && (
                                <motion.div 
                                    initial={{ opacity: 0 }} 
                                    animate={{ opacity: 1 }} 
                                    className="flex justify-start opacity-50 ml-6"
                                >
                                    <div className="flex space-x-3">
                                        <motion.div animate={{ y: [0, -5, 0] }} transition={{ duration: 1.5, repeat: Infinity, delay: 0 }} className="w-2 h-2 rounded-full bg-[#8B7E9A]"></motion.div>
                                        <motion.div animate={{ y: [0, -5, 0] }} transition={{ duration: 1.5, repeat: Infinity, delay: 0.2 }} className="w-2 h-2 rounded-full bg-[#8B7E9A]"></motion.div>
                                        <motion.div animate={{ y: [0, -5, 0] }} transition={{ duration: 1.5, repeat: Infinity, delay: 0.4 }} className="w-2 h-2 rounded-full bg-[#8B7E9A]"></motion.div>
                                    </div>
                                </motion.div>
                            )}
                            <div ref={chatEndRef} className="h-4 shrink-0" />
                        </div>
                    </div>
                    
                    <form onSubmit={handleSend} className="relative mt-6 mb-4">
                        <input 
                            type="text" 
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            placeholder="Type gently here..." 
                            className="w-full bg-white/40 backdrop-blur-md text-[#5C5470] placeholder-[#8B7E9A]/50 px-8 py-4 rounded-[40px] outline-none focus:bg-white/60 transition-all duration-500 font-light text-xl shadow-sm border border-white/30"
                        />
                    </form>
                    <style>{`
                        .no-scrollbar::-webkit-scrollbar { display: none; }
                        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
                    `}</style>
                </div>
            );
        };

        // THE LANDING CLEARING SCAFFOLD
        const LandingClearing = () => {
            const { volume, gravity, hidingPlace } = useContext(MeiContext);
            const [interactionPhase, setInteractionPhase] = useState('scaffold');
            const [apiKey, setApiKey] = useState(null);

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const urlKey = urlParams.get('key');
                if (urlKey) { localStorage.setItem('MEI_GEMINI_KEY', urlKey); setApiKey(urlKey); }
                else { setApiKey(localStorage.getItem('MEI_GEMINI_KEY')); }
            }, []);

            const triggerIntro = () => {
                if (interactionPhase === 'chat') return; 
                setInteractionPhase('chat');
            };

            // Slate background during Forge phase, otherwise mapped colors
            let bgClass = '';
            if (hidingPlace) {
                bgClass = '#0a0a0f';
            } else if (interactionPhase === 'scaffold') {
                bgClass = '#111827'; // Dark, textured slate
            } else {
                bgClass = emotionColors[volume] || '#E2E8F0';
            }

            return (
                <motion.div 
                    animate={{ backgroundColor: bgClass }}
                    transition={{ duration: 4, ease: 'easeOut' }}
                    className="w-full h-screen flex flex-col items-center justify-center relative text-textSoftDark overflow-hidden select-none cursor-pointer"
                    onClick={triggerIntro}
                >
                    <DiffusedCursor />
                    {!hidingPlace && <LeavesSystem emotion={volume} gravity={gravity} />}
                    {hidingPlace && (
                        <motion.div 
                            initial={{ opacity: 0 }} 
                            animate={{ opacity: 0.15 }} 
                            transition={{ duration: 3 }}
                            className="absolute inset-0 pointer-events-none bg-[radial-gradient(ellipse_at_center,_#fff_1px,_transparent_1.5px)] bg-[size:30px_30px]" 
                        />
                    )}

                    {interactionPhase === 'scaffold' && (
                        <IntroForge />
                    )}

                    {interactionPhase === 'chat' && (
                        <>
                            {!hidingPlace && <StoryTrees />}
                            {!hidingPlace && <ThePebble />}
                            
                            {/* Make absolute container pointer-events-none so StoryTrees behind it can receive clicks */}
                            <div className={`absolute inset-0 flex items-center justify-center pointer-events-none transition-opacity duration-1000 ${hidingPlace ? 'opacity-15' : 'opacity-100'}`} onClick={(e) => e.stopPropagation()}>
                                <ChatFlow apiKey={apiKey} />
                            </div>
                        </>
                    )}

                    {/* Breath-Sync Engine Soft Pulse applies to environment ambient atmosphere */}
                    {interactionPhase === 'chat' && (
                        <motion.div 
                            animate={{ opacity: [0.1, 0.2, 0.1] }}
                            transition={{ duration: 10, repeat: Infinity, ease: "easeInOut" }}
                            className="absolute inset-0 pointer-events-none bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-white/30 via-transparent to-transparent z-0"
                        />
                    )}
                </motion.div>
            );
        };

        const App = () => (
            <MeiProvider>
                <LandingClearing />
            </MeiProvider>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
