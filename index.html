<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mei | I Don't Know What To Say</title>
    <!-- Hosted at idontknowwhattosay.net -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F2EFE9;
            --text-dark: #2A2A2A;
            --mei-blue: #0ea5e9;
            --sporty-orange: #f59e0b;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --crisis-red: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .persona-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--mei-blue), var(--sporty-orange));
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(14, 165, 233, 0.3);
        }

        .persona-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .persona-status {
            font-size: 0.8rem;
            color: #666;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
        }

        .chat-container {
            flex-grow: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 1.05rem;
            line-height: 1.5;
            animation: fadeIn 0.4s ease forwards;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-mei {
            background: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .msg-user {
            background: var(--mei-blue);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.2);
        }

        .msg-system {
            background: rgba(239, 68, 68, 0.1);
            color: var(--crisis-red);
            align-self: center;
            text-align: center;
            font-size: 0.9rem;
            border-radius: 12px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            max-width: 90%;
            margin: 10px 0;
        }

        .input-area {
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex;
            gap: 12px;
        }

        input {
            flex-grow: 1;
            padding: 16px 24px;
            border-radius: 30px;
            border: 1px solid #ddd;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s;
            background: white;
            outline: none;
        }

        input:focus {
            border-color: var(--mei-blue);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }

        button {
            background: var(--mei-blue);
            color: white;
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background: #0284c7;
        }
        
        .worry-box-ui {
            background: #2a2a2a;
            color: white;
            padding: 20px;
            border-radius: 16px;
            margin-top: 10px;
            text-align: center;
            border: 2px solid #ed1c24; /* Pepsi Red */
            position: relative;
            overflow: hidden;
        }

        .emoji-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            font-size: 2rem;
        }

        .emoji-selector span {
            cursor: pointer;
            transition: transform 0.2s;
        }

        .emoji-selector span:hover {
            transform: scale(1.3);
        }

        .start-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .start-btn {
            background: rgba(255, 255, 255, 0.9);
            color: #10b981; /* Green color for the grass context */
            width: 80px;
            height: 80px;
            font-size: 2.5rem;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .start-btn:hover {
            transform: scale(1.1);
        }

        .floating-leaf {
            display: inline-block;
            animation: rustleGrass 4s ease-in-out infinite;
            transform-origin: bottom center;
        }

        @keyframes rustleGrass {
            0% { transform: rotate(0deg); }
            15% { transform: rotate(8deg); }
            30% { transform: rotate(-4deg); }
            45% { transform: rotate(6deg); }
            60% { transform: rotate(-2deg); }
            100% { transform: rotate(0deg); }
        }

    </style>
</head>
<body>

    <div class="start-overlay" id="startOverlay">
        <button class="start-btn" onclick="startSession()">
            <span class="floating-leaf">🌿</span>
        </button>
    </div>

    <header class="header">
        <div class="persona-info">
            <div class="avatar">M</div>
            <div>
                <div class="persona-name">Mei</div>
                <div class="persona-status"><span class="status-dot"></span> Online</div>
            </div>
        </div>
    </header>

    <div class="chat-container" id="chat">
        <!-- Chat messages will spawn here -->
    </div>

    <div class="input-area">
        <input type="text" id="chatInput" placeholder="How is your body feeling right now? Or type an emoji..." autocomplete="off">
        <button onclick="sendMessage()">→</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('chatInput');

        // API Architecture Toggles
        // PUBLIC DEPLOYMENT: If you want exactly zero popups for public clients without building a backend, 
        // you MUST log into Google Cloud Console, restrict your API Key strictly to "https://idontknowwhattosay.net/*", 
        // and only then securely paste it between these quotes below:
        const HARDCODED_PUBLIC_KEY = "AIzaSyDF1HpI1RIFenpJochk1-tba64OZTLiiXw"; 

        let GEMINI_API_KEY = null;
        let FETCH_URL = null;

        async function initializeGeminiKey() {
            // 0. Use Public Domain-Restricted Key if Provided
            if (HARDCODED_PUBLIC_KEY.length > 10) {
                GEMINI_API_KEY = HARDCODED_PUBLIC_KEY;
                console.log("Using Public Domain-Restricted API Key.");
            }

            // 1. Silent Mobile Magic Link Injector
            if (!GEMINI_API_KEY) {
                const urlParams = new URLSearchParams(window.location.search);
                const urlKey = urlParams.get('key') || urlParams.get('gemini');
                if (urlKey) {
                    localStorage.setItem('MEI_GEMINI_KEY', urlKey);
                    GEMINI_API_KEY = urlKey;
                    
                    // Erase the key from the browser URL bar so it doesn't look ugly
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            }

            // 2. Attempt to parse local .env file
            if (!GEMINI_API_KEY) {
                try {
                    const envResponse = await fetch('.env');
                    if (envResponse.ok) {
                        const text = await envResponse.text();
                        const match = text.match(/MEI_GEMINI_KEY=(.*)/);
                        if (match && match[1]) { GEMINI_API_KEY = match[1].trim(); }
                    }
                } catch (error) {}
            }

            // 3. Fallback to Local Cache / Prompt
            if (!GEMINI_API_KEY) {
                GEMINI_API_KEY = localStorage.getItem('MEI_GEMINI_KEY');
                if (!GEMINI_API_KEY) {
                    GEMINI_API_KEY = prompt("Local .env could not be read. Please enter your Gemini API Key for Mei's brain:");
                    if(GEMINI_API_KEY) localStorage.setItem('MEI_GEMINI_KEY', GEMINI_API_KEY);
                }
            }

            // Bind the active URL
            FETCH_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
        }
        
        // Execute initialization immediately
        initializeGeminiKey();

        // Chat History for LLM Memory
        // Security Update: The System Prompt (Mei's personality instructions) has been moved completely to the Backend Proxy.
        // It is no longer stored in the browser where it could be altered or stolen.
        let chatHistory = [];

        const escalators = ["bridge", "jump", "stop the pain", "pain forever", "die", "hurt myself", "heavy", "queensboro"];

        const synth = window.speechSynthesis;
        let meiVoices = [];

        // Load voices
        synth.onvoiceschanged = () => {
            const allVoices = synth.getVoices();
            
            // 1. First priority: Cloud-based Neural voices which sound natural
            let premiumVoices = allVoices.filter(v => v.lang.includes("en-US") && (v.name.includes("Natural") || v.name.includes("Online")));
            
            // 2. Target younger-sounding premium voices like Jenny (Microsoft) or Samantha (Apple)
            if (premiumVoices.length === 0) {
                premiumVoices = allVoices.filter(v => v.lang.includes("en-US") && ["Jenny", "Aria", "Samantha", "Google", "Zira"].some(name => v.name.includes(name)));
            }
            
            // 3. Fallback
            if(premiumVoices.length === 0) {
                premiumVoices = allVoices.filter(v => v.lang.includes("en-US") && (v.name.includes("Female") || v.name.includes("Woman")));
            }
            if(premiumVoices.length === 0) premiumVoices = allVoices.filter(v => v.lang.includes("en-US"));
            
            meiVoices = premiumVoices;
        };

        function speak(text) {
            // strip simple HTML and emojis to make it sound natural
            const cleanText = text.replace(/<[^>]*>?/gm, '').replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '');
            const utterThis = new SpeechSynthesisUtterance(cleanText);
            
            // Standardizing rate and pitch to 1.0. 
            // Modifying pitch/rate artificially forces the browser engine to distort the audio waves, creating the "robotic" sound.
            utterThis.rate = 1.0;  
            utterThis.pitch = 1.0; 
            
            if(meiVoices.length > 0) utterThis.voice = meiVoices[0]; // grab top matched voice
            synth.speak(utterThis);
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message msg-${sender}`;
            
            // XSS Prevention: Sanitize input from User or LLM to prevent DOM injection attacks
            // The system role still needs raw HTML for bolding the escalation warnings.
            if (sender === 'user' || sender === 'mei') {
                const sanitizedText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                div.innerHTML = sanitizedText;
            } else {
                div.innerHTML = text; // Allow HTML exclusively for hardcoded system warning text
            }
            
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;

            if(sender === 'mei') {
                speak(text);
            }
        }

        function startSession() {
            document.getElementById('startOverlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('startOverlay').style.display = 'none';
            }, 500);
        }

        const meiOpeners = [
            "Hello there. I'm Mei. I just got back from a quiet walk past Greenpoint Playground. 🌬️ I'm glad we can take some time today to focus on pediatric counseling and therapy. I'm here when you're ready.",
            "Hi, it's Mei. I just spent a few minutes organizing some art therapy supplies here in my Greenpoint office. 🎨 Take your time settling in. We can start whenever you feel comfortable.",
            "Welcome. I'm Mei. Watching the ferry pass by my window right now always grounds me. ⛴️ Setting aside this time for pediatric counseling is so important. I'm ready to listen.",
            "Hello, Mei here. I've got my comfortable counseling space all set up for the day. 🛋️ Just take a deep breath. We can begin our therapy session whenever you'd like.",
            "Hi there, I'm Mei. Just wrapped up a short morning meditation. 🪴 I find it helps me stay completely focused on my pediatric counseling practice. I'm right here for you today.",
            "Hello. It's Mei. The view of the East River from my office is wonderfully calm today. 🌊 I hope you can find a comfortable spot too as we begin our counseling session.",
            "Hi, Mei checking in. I just arranged some fresh flowers in my therapy room. 🌿 Please, take all the time you need to settle in. I'm right here.",
            "Welcome. I'm Mei. I just grabbed a warm tea from Manhattan Avenue and am settling into the office. 🍵 This time is dedicated entirely to you and our therapy session.",
            "Hello. Mei here. It's quiet in the office today, which I really appreciate. 🕰️ I'm fully focused on our pediatric counseling session. We can start slowly.",
            "Hi there, it's Mei. I just picked up my favorite Taiwanese snack from the bakery down the street. 🥮 I'm getting everything ready so I can give you my full attention today. I'm here when you are."
        ];
        
        const meiFollowUp = "How is your body feeling right now? If you had to pick an emoji for your energy today, which one would it be?";

        // Initialize Randomized Chat
        const randomOpener = meiOpeners[Math.floor(Math.random() * meiOpeners.length)];

        // Pre-load Mei's opening dialogue into the Gemini Memory so the AI remembers what she just said
        chatHistory.push({ "role": "model", "parts": [{ "text": randomOpener }] });
        chatHistory.push({ "role": "model", "parts": [{ "text": meiFollowUp }] });

        window.onload = () => {
            // Display Chat Visuals
            setTimeout(() => {
                addMessage(randomOpener, "mei");
                setTimeout(() => {
                    addMessage(meiFollowUp, "mei");
                }, 4000);
            }, 500);
        };

        async function sendMessage() {
            const text = input.value.trim();
            if(!text) return;

            addMessage(text, 'user');
            input.value = '';

            // Check for immediate crisis escalation locally before hitting LLM
            let escalated = false;
            escalators.forEach(trig => { if(text.toLowerCase().includes(trig)) escalated = true; });

            if(escalated) {
                setTimeout(() => { triggerCrisisProtocol(); }, 800);
                return;
            }

            // Show typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = `message msg-mei typing-indicator`;
            typingDiv.innerHTML = "Mei is thinking...";
            chat.appendChild(typingDiv);
            chat.scrollTop = chat.scrollHeight;

            // Push User Message to History
            chatHistory.push({
                "role": "user",
                "parts": [{ "text": text }]
            });

            // Call Gemini LLM (or your Backend Proxy)
            try {
                const response = await fetch(FETCH_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: chatHistory,
                        generationConfig: {
                            temperature: 0.7,
                            maxOutputTokens: 150
                        }
                    })
                });

                if(chat.contains(typingDiv)) chat.removeChild(typingDiv); 

                if (!response.ok) {
                    throw new Error("API Connection Failed");
                }

                const data = await response.json();
                const meiReply = data.candidates[0].content.parts[0].text;

                // Push Model Response to History
                chatHistory.push({
                    "role": "model",
                    "parts": [{ "text": meiReply }]
                });

                addMessage(meiReply, 'mei');

            } catch (error) {
                console.error("Gemini Error:", error);
                if(chat.contains(typingDiv)) chat.removeChild(typingDiv);
                addMessage("I'm sorry, I seem to be having trouble connecting. Let's take a deep breath and try again in a moment.", 'mei');
            }
        }

        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });

        function addWorryBox() {
            const div = document.createElement('div');
            div.className = "message msg-mei";
            div.innerHTML = `
                Imagine the big red Pepsi-Cola sign in LIC. Below it is our giant digital Worry Box. Toss it in!
                <div class="worry-box-ui">
                    <strong>Drop a worry here:</strong>
                    <div class="emoji-selector">
                        <span onclick="tossEmoji('🎒')">🎒</span>
                        <span onclick="tossEmoji('🌧️')">🌧️</span>
                        <span onclick="tossEmoji('🌪️')">🌪️</span>
                        <span onclick="tossEmoji('🪫')">🪫</span>
                    </div>
                </div>
            `;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function tossEmoji(emoji) {
            addMessage(emoji, "user");
            setTimeout(() => {
                addMessage(`Whoosh! You threw the ${emoji} right into the digital box. It's stored away so you don't have to carry it tonight.`, "mei");
            }, 800);
        }

        function triggerCrisisProtocol() {
            addMessage("Thank you for being so brave and telling me exactly how heavy things feel right now. I care about you, and because you're hurting that much, we are going to press pause on our regular check-in.", "mei");
            
            setTimeout(() => {
                addMessage("<b>SYSTEM OVERRIDE: CLINICAL ESCALATION ENGAGED</b><br>Silent PagerDuty/Slack alert dispatched to Supervisor Esther Loh, NCMHCE.<br>988 Crisis Copilot module engaged.", "system");
                
                setTimeout(() => {
                    addMessage("You don't have to carry this alone. I've sent a quick message to Esther so she knows you're having a really tough time today. I am also connecting us to a specialist friend of mine who knows exactly how to help when things feel way too heavy to hold. They're joining our chat right now. Can you take one deep breath with me while they hop in?", "mei");
                    
                    setTimeout(() => {
                        addMessage("<b>988 COPILOT CONNECTED.</b><br>Live clinical counselor has entered the session. Handoff complete.", "system");
                        input.placeholder = "Type to speak with 988 counselor...";
                        document.querySelector('.persona-name').innerText = "988 Support Counselor";
                        document.querySelector('.persona-status').innerHTML = "<span class='status-dot' style='background:#ef4444'></span> Priority Crisis Line";
                        document.querySelector('.avatar').innerText = "988";
                        document.querySelector('.avatar').style.background = "linear-gradient(135deg, #ef4444, #f59e0b)";
                    }, 4000);

                }, 2000);
            }, 1000);
        }
    </script>

</body>
</html>
