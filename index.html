<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Fail on Purpose - Pilgrimage</title>
<style>
    html, body {
        margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
        background-color: #000000; touch-action: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        font-family: "Georgia", serif; user-select: none; -webkit-user-select: none;
    }
    
    #gradient-bg {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
        background: radial-gradient(circle at center, #0a1014 0%, #010203 100%);
        transition: opacity 4s ease; 
    }
    
    #atmosphere { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    
    .grain {
        position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 10; opacity: 0.12;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        transition: opacity 4s ease;
    }

    #ui-layer {
        position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
        pointer-events: none; z-index: 30; display: flex; align-items: center; justify-content: center; flex-direction: column;
    }
    
    .cinematic-text {
        position: absolute; opacity: 0; color: #fff; font-style: italic; 
        text-shadow: 0 0 25px rgba(255,255,255,0.8); transition: opacity 3s ease;
        top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 100%;
        animation: shimmer 4s infinite alternate ease-in-out; pointer-events: none;
    }
    #idkwts-text { font-size: 2.2rem; letter-spacing: 3px; }
    
    @keyframes shimmer {
        0% { filter: brightness(0.8); text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        100% { filter: brightness(1.3); text-shadow: 0 0 35px rgba(255,255,255,1); }
    }

    #storm-container {
        position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
        z-index: 40; pointer-events: none; opacity: 1; transition: opacity 1s ease;
    }
    .storm-word {
        position: absolute; transform: translate(-50%, -50%);
        cursor: pointer; pointer-events: auto; padding: 25px;
    }
    .storm-word-inner {
        color: #e0e5ea; font-size: 1.15rem; letter-spacing: 2.5px;
        text-transform: uppercase; font-style: italic;
        animation: starBlink 2.5s infinite alternate ease-in-out; transition: all 0.5s ease;
    }
    @keyframes starBlink {
        0% { opacity: 0.15; transform: scale(0.95); text-shadow: 0 0 5px rgba(255,255,255,0.1); }
        100% { opacity: 0.95; transform: scale(1.05); text-shadow: 0 0 20px rgba(255,255,255,0.9); }
    }

    #chosen-words-header {
        position: absolute; top: 12%; left: 0; width: 100%; text-align: center;
        color: rgba(136, 207, 255, 0.6); font-size: 0.95rem; letter-spacing: 5px; text-transform: uppercase;
        z-index: 45; pointer-events: none; opacity: 0; transition: opacity 2s ease;
        text-shadow: 0 0 15px rgba(136, 207, 255, 0.4); font-style: italic; line-height: 2.2;
    }
    
    #story-container {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 800px;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        opacity: 0; z-index: 25; 
        transition: opacity 3s ease; pointer-events: none;
    }
    #final-sentence {
        color: #e0dcd3; font-size: 1.35rem; letter-spacing: 1.5px; text-align: justify; text-align-last: center; line-height: 2.0;
        text-shadow: 0 0 25px rgba(255,255,255,0.3); margin-bottom: 50px; font-style: italic;
    }
    
    .highlight { color: #88cfff; font-weight: bold; text-shadow: 0 0 15px rgba(136, 207, 255, 0.9); text-transform: uppercase; }

    .wa-btn {
        background: transparent; border: 1px solid rgba(136, 207, 255, 0.6);
        color: #88cfff; font-family: "Georgia", serif; font-size: 1.0rem;
        padding: 12px 35px; border-radius: 4px; cursor: pointer; pointer-events: auto;
        letter-spacing: 3px; transition: all 0.4s ease; text-transform: uppercase; text-decoration: none;
        box-shadow: 0px 0px 20px rgba(136, 207, 255, 0.2);
    }
    .wa-btn:active { background: rgba(136, 207, 255, 0.2); }

</style>
</head>
<body>
    <div id="gradient-bg"></div>
    <canvas id="atmosphere"></canvas>
    <div class="grain" id="grain-layer"></div>
    
    <div id="ui-layer">
        <div id="idkwts-text" class="cinematic-text">I don't know what to say.</div>
    </div>

    <div id="chosen-words-header"></div>
    <div id="storm-container"></div>
    
    <div id="story-container">
        <div id="final-sentence"></div>
        <a id="whatsapp-btn" href="#" target="_blank" class="wa-btn">Share The Pilgrimage</a>
    </div>

    <script>
        const svgPathStr = "M32,26 C22,12 5,14 2,32 C-1,47 15,50 28,38 C22,52 12,60 15,70 C18,77 28,70 32,57 C36,70 46,77 49,70 C52,60 42,52 36,38 C49,50 65,47 62,32 C59,14 42,12 32,26 Z";
        const svgPath2D = new Path2D(svgPathStr);

        const WORD_POOL = [
            "SNOW", "MOUNTAIN", "CALM", "LAKE", "QUIET", "FOREST", "BLUE", "SKY", "VAST", "OCEAN",
            "WIND", "BLOWING", "BREEZE", "ECHO", "STILLNESS", "HORIZON", "INFINITY", "DRIFT", "PEACE",
            "SPACE", "CLOUD", "STORM", "MIST", "GLOW", "DUSK", "DAWN", "SILENCE", "BREATH", "TIDE",
            "WAVE", "RIVER", "VALLEY", "CANYON", "FIELD", "MEADOW", "WILD", "CHILL", "FREEZE", "FLOAT",
            "GLIDE", "SOAR", "DEPTH", "ABYSS", "AURA", "LUMINESCENT", "SPARK", "SHADOW", "LIGHT", "VOID",
            "EXPANSE", "WHISPER", "PINE", "STAR", "GALAXY", "COSMOS", "NIGHT", "MIDNIGHT", "SOLITUDE"
        ];
        
        let chosenWords = [];

        const canvas = document.getElementById('atmosphere');
        const ctx = canvas.getContext('2d');
        let width, height;
        let isPitchBlack = false;

        function resize() { 
            width = window.innerWidth; height = window.innerHeight; 
            canvas.width = width * window.devicePixelRatio; 
            canvas.height = height * window.devicePixelRatio; 
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.addEventListener('resize', resize); resize();

        class Particle {
            constructor(mode = 'drift', startX = null, startY = null) {
                this.mode = mode; 
                this.size = Math.random() * 1.5 + 0.5;
                this.flapPhase = Math.random() * Math.PI * 2;
                this.isMorphed = false;
                
                this.x = startX !== null ? startX : Math.random() * width;
                this.y = startY !== null ? startY : Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                
                if (mode === 'drift') {
                    this.vx = (Math.random() - 0.5) * 0.15; 
                    this.vy = (Math.random() - 0.5) * 0.15;
                } else if (mode === 'scatter') {
                    this.morphToScatter();
                } else if (mode === 'cover') {
                    this.morphToCover();
                }
            }

            morphToScatter() {
                this.mode = 'scatter';
                this.isMorphed = true;
                this.morphColor = `hsla(${Math.random() * 360}, 75%, 65%, 0.8)`;
                this.morphSize = Math.random() * 25 + 15;
                this.flapSpeed = Math.random() * 0.05 + 0.03;
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 1.0 + 0.5;
                this.vx = Math.cos(angle) * speed; 
                this.vy = Math.sin(angle) * speed;
            }

            morphToCover() {
                this.mode = 'cover';
                this.isMorphed = true;
                this.morphColor = `hsla(${Math.random() * 360}, 75%, 65%, 1.0)`;
                this.morphSize = Math.random() * 35 + 20;
                let angle = Math.random() * Math.PI * 2;
                let dist = Math.max(width, height) + 150;
                this.x = width/2 + Math.cos(angle) * dist;
                this.y = height/2 + Math.sin(angle) * dist;
                
                this.targetX = width/2 + (Math.random() - 0.5) * (width * 0.8);
                this.targetY = height/2 + (Math.random() - 0.5) * (height * 0.8);
                this.vx = 0; 
                this.vy = 0;
                this.flapSpeed = Math.random() * 0.05 + 0.03;
                this.stateTime = 0;
                this.hasExploded = false;
            }
            
            update(dt) {
                if (this.mode === 'cover') {
                    this.stateTime += dt;
                    if (this.stateTime < 3.0) {
                        this.vx += (this.targetX - this.x) * 0.05 * (dt * 60);
                        this.vy += (this.targetY - this.y) * 0.05 * (dt * 60);
                        let friction = Math.pow(0.85, dt * 60);
                        this.vx *= friction; this.vy *= friction;
                    } else if (this.stateTime > 3.5) {
                        if (!this.hasExploded) {
                            let angle = Math.atan2(this.y - height/2, this.x - width/2) + (Math.random()-0.5)*0.5;
                            let burstSpd = Math.random() * 5 + 3;
                            this.vx = Math.cos(angle) * burstSpd; 
                            this.vy = Math.sin(angle) * burstSpd;
                            this.hasExploded = true;
                        }
                    }
                    this.x += this.vx * (dt * 60); this.y += this.vy * (dt * 60);
                    this.flapPhase += this.flapSpeed * (this.hasExploded ? 6.0 : 3.0) * (dt * 60); 
                } else {
                    this.x += this.vx * (dt * 60); this.y += this.vy * (dt * 60);
                    if (this.mode === 'drift') {
                        let spd = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                        if (spd > 0.4) { this.vx = (this.vx/spd)*0.4; this.vy = (this.vy/spd)*0.4; }

                        if (this.x < -20) this.x = width + 20; if (this.x > width + 20) this.x = -20;
                        if (this.y < -20) this.y = height + 20; if (this.y > height + 20) this.y = -20;
                    }
                    if (this.isMorphed) this.flapPhase += this.flapSpeed * 4.0 * (dt * 60);
                }
            }
            
            draw(ctx) {
                if (!this.isMorphed) {
                    if(!isPitchBlack) {
                        ctx.fillStyle = `rgba(180, 200, 215, 0.4)`;
                        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                    }
                } else {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    
                    if(Math.abs(this.vx) > 0.01 || Math.abs(this.vy) > 0.01) {
                        ctx.rotate(Math.atan2(this.vy, this.vx) + Math.PI / 2);
                    }
                    
                    let flapScale = 0.6 + 0.4 * Math.cos(this.flapPhase);
                    let bob = Math.sin(this.flapPhase) * 5;
                    
                    ctx.translate(0, bob);
                    ctx.scale(flapScale * (this.morphSize / 100), this.morphSize / 100);
                    ctx.translate(-32, -26); 
                    
                    ctx.fillStyle = this.morphColor;
                    ctx.shadowColor = this.morphColor;
                    ctx.shadowBlur = 10;
                    ctx.fill(svgPath2D);
                    
                    ctx.restore();
                }
            }
        }

        let particles = [];
        for (let i = 0; i < 150; i++) particles.push(new Particle('drift'));

        let ghostButterflies = [];
        
        class GhostButterfly {
            constructor(x, y, color, isBlue, onComplete) {
                this.x = x; this.y = y;
                this.color = color;
                this.isBlue = isBlue;
                this.onComplete = onComplete;
                this.age = 0;
                this.opacity = 0;
                this.size = 140;
                this.flapPhase = 0;
                this.vx = 0; this.vy = 0;
                this.dying = false; 
                
                if (this.isBlue) {
                    this.duration = 3.0; 
                    let dists = [
                        { x: -150, y: y, d: x }, { x: width + 150, y: y, d: width - x },
                        { x: x, y: -150, d: y }, { x: x, y: height + 150, d: height - y }
                    ];
                    let t = dists.reduce((p, c) => p.d < c.d ? p : c);
                    this.startX = x; this.startY = y;
                    this.targetX = t.x; this.targetY = t.y;
                } else {
                    this.vx = (Math.random() - 0.5) * 1.5; this.vy = (Math.random() - 0.5) * 1.5;
                    this.targetX = width/2; this.targetY = height/2;
                    this.angle = Math.atan2(this.vy, this.vx) + Math.PI/2;
                    this.isClickable = false;
                    setTimeout(() => { this.isClickable = true; }, 4000); 
                }
            }
            
            update(dt) {
                this.age += dt;
                
                if (this.dying) {
                    this.opacity -= dt * 2.5; 
                    if (this.opacity <= 0) return false; 
                } else if (this.isBlue) {
                    let progress = this.age / this.duration;
                    if (progress >= 1) {
                        this.dying = true;
                    }
                    
                    if (progress < 0.15) this.opacity = progress * 6.66;
                    else if (progress > 0.85) this.opacity = (1 - progress) * 6.66;
                    else this.opacity = 1;

                    this.x = this.startX + (this.targetX - this.startX) * progress;
                    this.y = this.startY + (this.targetY - this.startY) * progress;
                    
                    this.flapPhase = progress * Math.PI * 4;
                    this.angle = Math.atan2(this.targetY - this.startY, this.targetX - this.startX) + Math.PI/2;

                } else {
                    if (this.age < 2.0) this.opacity = this.age / 2.0; else this.opacity = 1;
                    
                    if (Math.random() < 0.015) {
                        this.targetX = Math.random() * (width - 150) + 75;
                        this.targetY = Math.random() * (height - 150) + 75;
                    }
                    
                    this.vx += (this.targetX - this.x) * 0.0005 * (dt * 60);
                    this.vy += (this.targetY - this.y) * 0.0005 * (dt * 60);
                    
                    let spd = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
                    if(spd > 1.0) { this.vx = (this.vx/spd)*1.0; this.vy = (this.vy/spd)*1.0; }
                    if(spd < 0.01) { this.vx += 0.01; this.vy += 0.01; } 
                    
                    this.x += this.vx * (dt * 60); this.y += this.vy * (dt * 60);
                    this.flapPhase += dt * 1.5; 
                    
                    let targetAngle = Math.atan2(this.vy, this.vx) + Math.PI/2;
                    if (this.angle === undefined) this.angle = targetAngle;
                    let diff = targetAngle - this.angle;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    this.angle += diff * 0.05 * (dt * 60);
                }
                return true;
            }
            
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, Math.min(1, this.opacity));
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                let flapScale = 0.6 + 0.4 * Math.cos(this.flapPhase);
                let bob = Math.sin(this.flapPhase) * 6;
                
                ctx.translate(0, bob);
                ctx.scale(flapScale * (this.size/100), this.size/100);
                ctx.translate(-32, -26); 
                
                ctx.shadowColor = this.color; ctx.shadowBlur = 30; ctx.fillStyle = this.color;
                ctx.fill(svgPath2D);
                
                ctx.restore();
            }
        }

        let step = 1; 
        let locked = false;
        let pointer = { x: -1000, y: -1000, isActive: false };
        let currentMaxLines = 3;

        function updatePointer(e) {
            let px = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
            let py = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;
            pointer.x = px || width/2; pointer.y = py || height/2;
        }

        window.addEventListener('pointerdown', e => {
            if (locked) return;
            if (e.target.closest('.storm-word') || e.target.closest('.wa-btn')) return; 
            
            updatePointer(e);

            if (step === 8) {
                for (let i = ghostButterflies.length - 1; i >= 0; i--) {
                    let gb = ghostButterflies[i];
                    if (!gb.isBlue && gb.isClickable && !gb.dying) {
                        let dx = pointer.x - gb.x; let dy = pointer.y - gb.y;
                        if (dx*dx + dy*dy < 15000) { 
                            gb.dying = true; 
                            handleTouch8();
                            return;
                        }
                    }
                }
                return; 
            }
            
            if (step === 10) { step = -1; startWordStorm(10); step = 11; return; }
            if (step > 7) return; 
            
            pointer.isActive = true; 

            if ([1, 2, 4, 6].includes(step)) {
                currentMaxLines = Math.floor(Math.random() * 7) + 3; 
            }
            else if (step === 3 || step === 5) {
                locked = true; pointer.isActive = false; 
                ghostButterflies.push(new GhostButterfly(pointer.x, pointer.y, "rgba(90, 180, 255, 0.9)", true, () => {
                    step++; locked = false;
                }));
            }
            else if (step === 7) {
                locked = true; pointer.isActive = false; 
                ghostButterflies.push(new GhostButterfly(pointer.x, pointer.y, "rgba(255, 60, 60, 0.9)", false));
                setTimeout(() => { step = 8; locked = false; }, 4000); 
            }
        });

        window.addEventListener('pointermove', e => { if (pointer.isActive) updatePointer(e); });

        window.addEventListener('pointerup', () => {
            if (locked || !pointer.isActive) return;
            pointer.isActive = false;
            if ([1, 2, 4, 6].includes(step)) step++;
        });

        function handleTouch8() {
            step = -1; 
            isPitchBlack = true;
            document.getElementById('gradient-bg').style.opacity = '0';
            document.getElementById('grain-layer').style.opacity = '0';
            
            let oldParticles = particles;
            particles = [];
            oldParticles.forEach(p => {
                particles.push(new Particle('scatter', p.x, p.y)); 
            });
            
            let idkwts = document.getElementById('idkwts-text');
            idkwts.style.opacity = '1';
            
            setTimeout(() => {
                idkwts.style.opacity = '0';
                setTimeout(() => { step = 10; locked = false; particles = []; }, 3000);
            }, 4000);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startWordStorm(count) {
            const container = document.getElementById('storm-container');
            container.innerHTML = ''; 
            container.style.opacity = '1';
            
            let available = WORD_POOL.filter(w => !chosenWords.includes(w));
            available = shuffleArray(available);
            let currentWords = available.slice(0, count);
            
            let cols = count >= 6 ? 4 : 3; let rows = count >= 6 ? 3 : 2;
            let cellW = width / cols; let cellH = height / rows;
            let cells = [];
            for(let c=0; c<cols; c++) { for(let r=0; r<rows; r++) { cells.push({c, r}); } }
            cells = shuffleArray(cells).slice(0, count);

            let wordSelected = false; 

            currentWords.forEach((word, index) => {
                let cell = cells[index];
                let wDiv = document.createElement('div');
                wDiv.className = 'storm-word';
                
                let posX = cell.c * cellW + (cellW * 0.5) + (Math.random() * 40 - 20);
                let posY = cell.r * cellH + (cellH * 0.5) + (Math.random() * 40 - 20);
                
                posX = Math.max(80, Math.min(width - 80, posX));
                posY = Math.max(150, Math.min(height - 80, posY)); 

                wDiv.style.left = `${posX}px`; wDiv.style.top = `${posY}px`;
                wDiv.innerHTML = `<div class="storm-word-inner" style="animation-delay: ${Math.random() * 2}s">${word}</div>`;
                container.appendChild(wDiv);

                wDiv.addEventListener('pointerdown', (e) => {
                    e.stopPropagation();
                    if (wordSelected) return; 
                    wordSelected = true;
                    
                    wDiv.classList.add('selected');
                    chosenWords.push(word);
                    
                    let header = document.getElementById('chosen-words-header');
                    header.innerText = chosenWords.join("   ·   ");
                    header.style.opacity = '1';
                    
                    let inner = wDiv.querySelector('.storm-word-inner');
                    inner.style.animation = 'none';
                    inner.style.color = '#88cfff';
                    inner.style.textShadow = '0 0 20px rgba(136, 207, 255, 0.9)';
                    inner.style.transform = 'scale(1.2)';
                    
                    Array.from(container.children).forEach(child => {
                        if(child !== wDiv) {
                            child.style.opacity = '0';
                            child.style.pointerEvents = 'none';
                        }
                    });

                    setTimeout(() => {
                        container.style.opacity = '0';
                        setTimeout(() => {
                            if (chosenWords.length < 6) {
                                startWordStorm(5); 
                            } else {
                                document.getElementById('chosen-words-header').style.opacity = '0';
                                triggerUnveilSequence(); 
                            }
                        }, 1000);
                    }, 1000);
                }, {once: true});
            });
        }

        function triggerFinalParagraph() {
            let finalContainer = document.getElementById('story-container');
            let textDiv = document.getElementById('final-sentence');
            let btn = document.getElementById('whatsapp-btn');
            
            let w = chosenWords;

            const templates = [
                `We build our identities out of KPIs, performing for permission to exist. But stepping into the <span class='highlight'>${w[0]}</span>, there is nothing to prove and nothing to lose. The <span class='highlight'>${w[1]}</span> does not ask for your credentials; the <span class='highlight'>${w[2]}</span> does not measure your output. When you embrace the 0% Chance Mindset, you unlearn the fear that has kept you clenched. You are allowed to wander through the <span class='highlight'>${w[3]}</span>, guided only by desire. Allow the <span class='highlight'>${w[4]}</span> to remind you that life was never a train on a track. Trust the <span class='highlight'>${w[5]}</span>, roll the dice, and fail on purpose.`,
                
                `In the Cult of Achievement, success becomes our shield against shame, shrinking our world until we forget the feeling of the <span class='highlight'>${w[0]}</span>. But when you deliberately attempt the impossible, the pressure collapses. Standing in the <span class='highlight'>${w[1]}</span>, you realize that failure is not a verdict—it is an experience as profound as the <span class='highlight'>${w[2]}</span>. As you lay down the armor of perfection, the <span class='highlight'>${w[3]}</span> opens up before you. You don’t pick the path because of the destination; you discover the <span class='highlight'>${w[4]}</span> because of the path. Breathe in the <span class='highlight'>${w[5]}</span>. You are finally free to live on purpose.`,
                
                `Somewhere along the way, success stopped being a direction and became a demand, distancing us from the quiet truth of the <span class='highlight'>${w[0]}</span>. But the moment you embrace guaranteed failure, you break the contract. You step into the <span class='highlight'>${w[1]}</span> and realize the ego has nothing left to defend. The <span class='highlight'>${w[2]}</span> does not judge your missteps; the <span class='highlight'>${w[3]}</span> simply holds space for your exploration. Wayfinding begins when you leave the tracks behind and venture into the <span class='highlight'>${w[4]}</span>. Let the <span class='highlight'>${w[5]}</span> carry you forward. Fail loudly. Fail joyfully. Fail on purpose.`
            ];

            let rawText = templates[Math.floor(Math.random() * templates.length)];
            textDiv.innerHTML = rawText;
            
            let plainText = rawText.replace(/<[^>]*>?/gm, '');
            let encodedText = encodeURIComponent(`I just discovered the 0% Chance Mindset:\n\n"${plainText}"\n\nExplore at https://failonpurpose.com`);
            btn.href = `https://wa.me/?text=${encodedText}`;

            finalContainer.style.opacity = '1';
        }

        function triggerUnveilSequence() {
            canvas.style.zIndex = "100";
            
            for(let i=0; i<200; i++) particles.push(new Particle('cover'));
            
            setTimeout(() => { triggerFinalParagraph(); }, 3000); 

            setTimeout(() => {
                canvas.style.zIndex = "1";
                document.getElementById('story-container').style.pointerEvents = 'auto';
            }, 6500);
        }

        let lastTime = performance.now();
        function animate() {
            let currentTime = performance.now();
            let dt = (currentTime - lastTime) / 1000;
            if (dt > 0.1) dt = 0.016; 
            lastTime = currentTime;

            ctx.clearRect(0, 0, width, height);
            
            if (pointer.isActive && !isPitchBlack && [1, 2, 4, 6].includes(step)) {
                let nearest = particles.filter(p => !p.isMorphed).map(p => ({p, distSq: (p.x - pointer.x)**2 + (p.y - pointer.y)**2})).sort((a,b) => a.distSq - b.distSq);
                let linesDrawn = 0; ctx.lineWidth = 1.0; ctx.lineCap = 'round';
                
                for (let i = 0; i < nearest.length; i++) {
                    if (linesDrawn >= currentMaxLines) break; 
                    if (nearest[i].distSq < 60000) {
                        let opacity = (1 - Math.sqrt(nearest[i].distSq)/244) * 0.8;
                        ctx.strokeStyle = `rgba(180, 210, 230, ${opacity})`;
                        ctx.beginPath(); ctx.moveTo(pointer.x, pointer.y); ctx.lineTo(nearest[i].p.x, nearest[i].p.y); ctx.stroke();
                        
                        nearest[i].p.vx += (pointer.x - nearest[i].p.x) * 0.0001 * (dt * 60); 
                        nearest[i].p.vy += (pointer.y - nearest[i].p.y) * 0.0001 * (dt * 60);
                        linesDrawn++;
                    }
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update(dt);
                if (!(isPitchBlack && !p.isMorphed)) {
                    p.draw(ctx);
                }
                
                if (p.mode === 'cover' && p.hasExploded && (p.x < -200 || p.x > width + 200 || p.y < -200 || p.y > height + 200)) {
                    particles.splice(i, 1);
                }
            }

            for (let i = ghostButterflies.length - 1; i >= 0; i--) {
                let gb = ghostButterflies[i];
                if (!gb.update(dt)) {
                    ghostButterflies.splice(i, 1);
                    if (gb.isBlue && gb.onComplete) gb.onComplete();
                } else {
                    gb.draw(ctx);
                }
            }
            
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    </script>
