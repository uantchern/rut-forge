<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Clearing | Mei</title>

    <!-- Tailwind Configuration for The Five Volumes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        volumeWhisper: '#E6E6FA',
                        volumeTalk: '#E5E7EB',
                        volumeShout: '#FF7F50',
                        volumeLaugh: '#FDE047',
                        volumeCry: '#4682B4',
                        clearingBg: '#FDFBF7', /* Warm, safe, creamy off-white */
                        textSoftDark: '#5C5470'
                    },
                    animation: {
                        'breath': 'pulse-glow 10s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <!-- React, DOM, Babel, and Framer Motion CDN Architecture -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #FDFBF7; overflow: hidden; color: #5C5470; font-family: system-ui, -apple-system, sans-serif;}
        
        .text-soft { text-shadow: 0 0 15px rgba(92,84,112,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;
        const { motion, useSpring, useMotionValue } = window.Motion;

        // 1. THE BREATH-SYNC ENGINE: 6 BPM Global State
        const MeiContext = createContext();
        const MeiProvider = ({ children }) => {
            const [volume, setVolume] = useState('whisper'); // Whisper, Talk, Shout, Laugh, Cry
            
            return (
                <MeiContext.Provider value={{ volume, setVolume }}>
                    {children}
                </MeiContext.Provider>
            );
        };

        // 4. WAYFINDING NAVIGATION: A gentle, warm ambient sunlight that follows the cursor instead of a harsh glow
        const DiffusedCursor = () => {
            const cursorX = useMotionValue(window.innerWidth / 2);
            const cursorY = useMotionValue(window.innerHeight / 2);
            const springConfig = { damping: 40, stiffness: 80, mass: 1 };
            const mouseX = useSpring(cursorX, springConfig);
            const mouseY = useSpring(cursorY, springConfig);

            useEffect(() => {
                const moveCursor = (e) => {
                    cursorX.set(e.clientX);
                    cursorY.set(e.clientY);
                };
                window.addEventListener("mousemove", moveCursor);
                return () => window.removeEventListener("mousemove", moveCursor);
            }, [cursorX, cursorY]);

            return (
                <motion.div 
                    className="pointer-events-none fixed top-0 left-0 w-[600px] h-[600px] -mt-[300px] -ml-[300px] z-0 rounded-full blur-3xl opacity-60"
                    style={{ 
                        x: mouseX, 
                        y: mouseY,
                        background: 'radial-gradient(circle, rgba(255,228,196,0.5) 0%, rgba(253,251,247,0) 70%)' // Warm peach/sunlight gradient
                    }} 
                />
            );
        };

        const analyzeSentiment = (text) => {
            const lText = text.toLowerCase();
            if (/(hate|angry|mad|furious|scream|annoyed|bad|worse|!!)/.test(lText)) return 'shout';
            if (/(sad|cry|lonely|depressed|hurt|pain|tears|sorry|scared|heavy|alone|grief|\?)/.test(lText)) return 'cry';
            if (/(haha|yay|love|happy|joy|glad|excited|lol|lmao|smile|good|great)/.test(lText)) return 'laugh';
            if (/(shh|quiet|whisper|soft|tired|sleepy|gentle)/.test(lText)) return 'whisper';
            return 'talk'; // Default state when no emotion is strongly detected
        };

        const volumeColors = {
            'whisper': { start: '#E6E6FA', end: '#B4D4FF', bg: '#FDFBF7' },
            'talk': { start: '#E5E7EB', end: '#D1D5DB', bg: '#FDFCFB' },
            'shout': { start: '#FF7F50', end: '#EF4444', bg: '#FEF2F2' },
            'laugh': { start: '#FDE047', end: '#F59E0B', bg: '#FFFBEB' },
            'cry': { start: '#4682B4', end: '#312E81', bg: '#EEF2FF' }
        };

        // 3. THE "LEAF" PROXY: A gentle floating leaf replacing the amoeba
        const LeafProxy = ({ onClick, isChatPhase }) => {
            const { volume } = useContext(MeiContext);
            const colors = volumeColors[volume] || volumeColors['talk'];

            // Completely unmount during chat to ensure it never blocks text on small mobile screens
            if (isChatPhase) return null;

            return (
                <motion.div 
                    whileHover={{ scale: 1.05 }}
                    whileTap={{ scale: 0.95 }}
                    onClick={onClick}
                    className="relative cursor-pointer z-20 flex flex-col items-center group mb-8"
                    initial={{ opacity: 0, scale: 0.8, y: 30 }}
                    animate={{ opacity: 1, scale: 1, y: 0 }}
                    transition={{ duration: 3, ease: "easeOut" }}
                >
                    {volume === 'shout' && (
                        <motion.div animate={{ x: [-3, 3, -3] }} transition={{ repeat: Infinity, duration: 0.1 }} className="absolute inset-0 z-0" />
                    )}
                    {/* Breath-sync shadow matching 6 BPM (10s total cycle) taking on the emotional volume color */}
                    <div className="absolute inset-0 flex items-center justify-center">
                        <motion.div 
                            animate={{ opacity: [0.3, 0.7, 0.3], scale: [1, 1.3, 1] }}
                            transition={{ duration: 10, repeat: Infinity, ease: "easeInOut" }}
                            className="rounded-full blur-3xl z-0 w-32 h-32 md:w-48 md:h-48"
                            style={{ backgroundColor: colors.start }}
                        />
                    </div>
                    
                    <div className="relative z-10 flex flex-col items-center justify-center">
                        {/* The Floating Leaf */}
                        <motion.div 
                            animate={{ y: [0, -15, 0], rotate: [-5, 5, -5] }}
                            transition={{ duration: 6, repeat: Infinity, ease: "easeInOut" }}
                            className="text-7xl md:text-9xl drop-shadow-xl"
                            style={{ filter: `drop-shadow(0px 10px 20px ${colors.start}50)` }}
                        >
                            🍃
                        </motion.div>
                        
                        {/* The Anchor Text */}
                        <div className="mt-8 text-xs md:text-sm font-semibold tracking-[0.4em] text-textSoftDark uppercase bg-white/60 backdrop-blur-xl px-8 py-3 rounded-full shadow-sm border border-white/20 hover:bg-white/80 transition-all">
                            i don't know
                        </div>
                    </div>
                </motion.div>
            );
        };

        // CHAT INTERFACE: Zero hard lines
        const ChatFlow = ({ apiKey }) => {
            const { setVolume } = useContext(MeiContext);
            const [input, setInput] = useState('');
            const [messages, setMessages] = useState([]);
            const [loading, setLoading] = useState(false);
            const chatEndRef = React.useRef(null);

            const systemInstruction = {
                "role": "user",
                "parts": [{ "text": "System Instruction: You are Mei, a bicultural counselor in Greenpoint. You run 'I Don't Know What To Say'. You are calm, friendly, grounded. Never be hyper. Keep responses to 1-2 soft sentences." }]
            };
            const systemAck = { "role": "model", "parts": [{ "text": "Understood. I am Mei. I am listening softly." }] };

            useEffect(() => {
                // Initialize with random opener
                const openers = [
                    "Hello there. I'm Mei. I'm glad we can take some time today to focus on pediatric counseling and therapy. I'm here when you're ready.",
                    "Hi, it's Mei. I just spent a few minutes organizing some art therapy supplies. We can start whenever you feel comfortable.",
                    "Welcome. I'm Mei. Watching the ferry pass by my window right now always grounds me. I'm ready to listen."
                ];
                const startMsg = openers[Math.floor(Math.random() * openers.length)];
                setMessages([
                    { role: 'model', text: startMsg },
                    { role: 'model', text: "How is your body feeling right now? If you had to pick an emoji for your energy today, which one would it be?" }
                ]);
            }, []);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const handleSend = async (e) => {
                e.preventDefault();
                if (!input.trim() || !apiKey) return;
                
                const userText = input.trim();
                setInput('');
                
                // 1. Push User message to UI state immediately
                setMessages(prev => [...prev, { role: 'user', text: userText }]);
                
                // 2. Trigger Affective NLP Engine
                setVolume(analyzeSentiment(userText));
                setLoading(true);

                // 3. Format strictly alternating API History for Gemini
                const rawMessages = [...messages, { role: 'user', text: userText }];
                const apiHistory = [];
                
                rawMessages.forEach(m => {
                    const mappedRole = m.role === 'user' ? 'user' : 'model';
                    if (apiHistory.length > 0 && apiHistory[apiHistory.length - 1].role === mappedRole) {
                        // Concatenate adjacent identical roles to prevent Gemini 400 Bad Request
                        apiHistory[apiHistory.length - 1].parts[0].text += "\n\n" + m.text;
                    } else {
                        apiHistory.push({ role: mappedRole, parts: [{ text: m.text }] });
                    }
                });

                // Gemini API strictly requires history to begin with 'user'
                if (apiHistory.length > 0 && apiHistory[0].role === 'model') {
                    apiHistory.unshift({ role: 'user', parts: [{ text: "(User enters the clearing silently)" }] });
                }

                try {
                    const fetchUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
                    const res = await fetch(fetchUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            systemInstruction: { parts: [{ text: "You are Mei, a bicultural pediatric counselor in Greenpoint. You run 'I Don't Know What To Say'. You are calm, friendly, grounded. Never be hyper. Keep responses to 1-2 soft sentences." }] },
                            contents: apiHistory, 
                            generationConfig: { temperature: 0.7, maxOutputTokens: 150 } 
                        })
                    });
                    
                    const data = await res.json();
                    
                    if (!res.ok) {
                        throw new Error(`API Error: ${data.error?.message || res.status}`);
                    }
                    
                    if(data.candidates && data.candidates.length > 0) {
                        const reply = data.candidates[0].content.parts[0].text;
                        setMessages(prev => [...prev, { role: 'model', text: reply }]);
                    }
                } catch (err) {
                    console.error("Mei API Error:", err);
                    setMessages(prev => [...prev, { role: 'model', text: "I'm sorry, I'm having a little trouble hearing you. Let's take a deep breath and try that again." }]);
                }
                setLoading(false);
            };

            return (
                <div className="w-full max-w-2xl h-[65vh] flex flex-col z-10 px-6 drop-shadow-sm">
                    <div className="flex-1 overflow-y-auto w-full no-scrollbar pb-8 space-y-8 flex flex-col mask-image-b">
                        {messages.map((m, i) => (
                            <motion.div 
                                key={i}
                                initial={{ opacity: 0, y: 10 }}
                                animate={{ opacity: 1, y: 0 }}
                                transition={{ duration: 1.5, ease: 'easeOut' }}
                                className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}
                            >
                                <p className={`max-w-[80%] text-lg md:text-2xl font-light leading-relaxed tracking-wide ${m.role === 'user' ? 'text-[#8B7E9A] text-right' : 'text-textSoftDark text-left'}`}>
                                    {m.text}
                                </p>
                            </motion.div>
                        ))}
                        {loading && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="text-[#8B7E9A] text-lg font-light">mei is thinking...</motion.div>
                        )}
                        <div ref={chatEndRef} className="h-4" />
                    </div>
                    
                    <form onSubmit={handleSend} className="relative mt-2">
                        <input 
                            type="text" 
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            placeholder="Type gently here..." 
                            className="w-full bg-white/40 backdrop-blur-md text-textSoftDark placeholder-[#8B7E9A]/60 px-6 py-4 rounded-3xl outline-none focus:bg-white/60 transition-all duration-500 font-light text-xl shadow-sm"
                        />
                    </form>
                    <style>{`
                        .no-scrollbar::-webkit-scrollbar { display: none; }
                        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
                        .mask-image-b { mask-image: linear-gradient(to bottom, black 80%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%); }
                    `}</style>
                </div>
            );
        };

        // 2. THE LANDING CLEARING SCAFFOLD
        const LandingClearing = () => {
            const { volume, setVolume } = useContext(MeiContext);
            const [interactionPhase, setInteractionPhase] = useState('scaffold');
            const [apiKey, setApiKey] = useState(null);

            useEffect(() => {
                const HARDCODED_PUBLIC_KEY = "AIzaSyDF1HpI1RIFenpJochk1-tba64OZTLiiXw";
                const urlParams = new URLSearchParams(window.location.search);
                const urlKey = urlParams.get('key');
                if (urlKey) { localStorage.setItem('MEI_GEMINI_KEY', urlKey); setApiKey(urlKey); }
                else if (HARDCODED_PUBLIC_KEY.length > 10) { setApiKey(HARDCODED_PUBLIC_KEY); }
                else { setApiKey(localStorage.getItem('MEI_GEMINI_KEY')); }
            }, []);

            const triggerIntro = () => {
                if(!apiKey) {
                    const key = prompt("Please enter your Gemini API Key to connect with Mei:");
                    if(key) { localStorage.setItem('MEI_GEMINI_KEY', key); setApiKey(key); }
                    else return;
                }
                setInteractionPhase('chat');
                setVolume('talk'); // Default to talk phase for chat
            };

            const bgClass = volumeColors[volume]?.bg || '#FDFBF7';

            return (
                <motion.div 
                    animate={{ backgroundColor: bgClass }}
                    transition={{ duration: 3 }}
                    className="w-full h-screen flex flex-col items-center justify-center relative text-textSoftDark overflow-hidden select-none"
                >
                    <DiffusedCursor />

                    {interactionPhase === 'scaffold' && (
                        <div className="flex flex-col items-center space-y-16 mt-16 z-20">
                            <motion.h1 
                                initial={{ opacity: 0, filter: "blur(10px)", y: -20 }}
                                animate={{ opacity: 0.6, filter: "blur(0px)", y: 0 }}
                                transition={{ duration: 4, delay: 0.5 }}
                                className="text-xl md:text-3xl tracking-[0.4em] font-light text-soft text-[#8B7E9A]"
                            >
                                THE CLEARING
                            </motion.h1>
                            
                            <LeafProxy onClick={triggerIntro} isChatPhase={false} />
                            
                            <motion.p
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 0.5 }}
                                transition={{ duration: 3, delay: 3 }}
                                className="text-xs md:text-sm font-medium tracking-widest text-[#8B7E9A]"
                            >
                                [ DRAG OR TAP TO BEGIN ]
                            </motion.p>
                        </div>
                    )}

                    {interactionPhase === 'chat' && (
                        <>
                            <div className="absolute top-4 right-4 md:top-8 md:right-8 opacity-60 z-20">
                                <LeafProxy onClick={() => {}} isChatPhase={true} />
                            </div>
                            <ChatFlow apiKey={apiKey} />
                        </>
                    )}

                    {/* Background Heartbeat Rhythm (6 BPM Inhale/Exhale Pulse) */}
                    <motion.div 
                        animate={{ opacity: [0.1, 0.3, 0.1] }}
                        transition={{ duration: 10, repeat: Infinity, ease: "easeInOut" }}
                        className="absolute inset-0 pointer-events-none bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-white/20 via-transparent to-transparent z-0"
                    />
                </motion.div>
            );
        };

        const App = () => (
            <MeiProvider>
                <LandingClearing />
            </MeiProvider>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
