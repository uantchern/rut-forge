<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Clearing | Mei</title>

    <!-- Tailwind Configuration for The Five Volumes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        volumeWhisper: '#E6E6FA',
                        volumeTalk: '#E5E7EB',
                        volumeShout: '#FF7F50',
                        volumeLaugh: '#FDE047',
                        volumeCry: '#4682B4',
                        clearingBg: '#FDFBF7', /* Warm, safe, creamy off-white */
                        textSoftDark: '#5C5470'
                    },
                    animation: {
                        'breath': 'pulse-glow 10s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <!-- React, DOM, Babel, and Framer Motion CDN Architecture -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #FDFBF7; overflow: hidden; color: #5C5470; font-family: system-ui, -apple-system, sans-serif;}
        
        .text-soft { text-shadow: 0 0 15px rgba(92,84,112,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;
        const { motion, useSpring, useMotionValue } = window.Motion;

        // 1. THE BREATH-SYNC ENGINE: 6 BPM Global State
        const MeiContext = createContext();
        const MeiProvider = ({ children }) => {
            const [volume, setVolume] = useState('whisper'); // Whisper, Talk, Shout, Laugh, Cry
            
            return (
                <MeiContext.Provider value={{ volume, setVolume }}>
                    {children}
                </MeiContext.Provider>
            );
        };

        // 4. WAYFINDING NAVIGATION: A gentle, warm ambient sunlight that follows the cursor instead of a harsh glow
        const DiffusedCursor = () => {
            const cursorX = useMotionValue(window.innerWidth / 2);
            const cursorY = useMotionValue(window.innerHeight / 2);
            const springConfig = { damping: 40, stiffness: 80, mass: 1 };
            const mouseX = useSpring(cursorX, springConfig);
            const mouseY = useSpring(cursorY, springConfig);

            useEffect(() => {
                const moveCursor = (e) => {
                    cursorX.set(e.clientX);
                    cursorY.set(e.clientY);
                };
                window.addEventListener("mousemove", moveCursor);
                return () => window.removeEventListener("mousemove", moveCursor);
            }, [cursorX, cursorY]);

            return (
                <motion.div 
                    className="pointer-events-none fixed top-0 left-0 w-[600px] h-[600px] -mt-[300px] -ml-[300px] z-0 rounded-full blur-3xl opacity-60"
                    style={{ 
                        x: mouseX, 
                        y: mouseY,
                        background: 'radial-gradient(circle, rgba(255,228,196,0.5) 0%, rgba(253,251,247,0) 70%)' // Warm peach/sunlight gradient
                    }} 
                />
            );
        };

        const analyzeSentiment = (text) => {
            const lText = text.toLowerCase();
            if (/(hate|angry|mad|furious|scream|annoyed|bad|worse|!!)/.test(lText)) return 'angry';
            if (/(sad|cry|lonely|depressed|hurt|pain|tears|sorry|scared|alone|grief|\?)/.test(lText)) return 'sad';
            if (/(overwhelm|heavy|much|stress|busy|anxious|panic|can't|cannot)/.test(lText)) return 'overwhelmed';
            return 'neutral'; // Default state: gentle bobbing
        };

        const emotionColors = {
            'neutral': '#FDFBF7',
            'sad': '#EEF2FF',
            'angry': '#FEF2F2',
            'overwhelmed': '#F5F3FF'
        };

        // THE PARTICLE SYSTEM: Affective Leaves
        const Leaf = ({ index, emotion }) => {
            // Generate deterministic organic physics for this specific leaf on mount
            const leaf = React.useMemo(() => ({
                size: 20 + Math.random() * 80,           // Massive size variance for depth (foreground/background)
                startX: Math.random() * 120 - 10,        // Spawns smoothly across width
                startY: Math.random() * 120 - 10,        // Spawns smoothly across height
                delay: Math.random() * 5,
                speed: 0.5 + Math.random(),              // Trajectory speed variance
                sway: (Math.random() - 0.5) * 40,        // Unique horizontal path turbulence
                rotStart: Math.random() * 360,           // Start at random angle
                rotEnd: (Math.random() * 720 + 360) * (Math.random() > 0.5 ? 1 : -1), // Spin direction and speed
                blur: Math.random() > 0.6 ? Math.random() * 8 : 0, // Depth of Field blur mapping
                opacity: 0.2 + Math.random() * 0.6       // Organic leaf transparency
            }), []);

            let initialInner = { rotate: leaf.rotStart };
            let animateInner = {};
            let transitionInner = { repeat: Infinity, ease: "linear" };
            let styleOuter = { 
                left: `${leaf.startX}vw`, 
                top: `${leaf.startY}vh`, 
                width: leaf.size, 
                height: leaf.size,
                filter: `blur(${leaf.blur}px)`
            };

            if (emotion === 'neutral') {
                animateInner = { 
                    y: [0, leaf.sway * 1.5, 0], 
                    x: [0, leaf.sway, 0], 
                    rotate: [leaf.rotStart, leaf.rotStart + (leaf.sway * 2)] 
                };
                transitionInner = { duration: 15 * leaf.speed + 10, repeat: Infinity, ease: "easeInOut", delay: leaf.delay };
            } else if (emotion === 'sad') {
                styleOuter.top = '-15vh';
                animateInner = { 
                    y: ['-10vh', '115vh'], 
                    x: ['0vw', `${leaf.sway * 2}vw`, `${-leaf.sway}vw`], 
                    rotate: [leaf.rotStart, leaf.rotStart + leaf.rotEnd / 4] 
                };
                transitionInner = { duration: 25 * leaf.speed + 20, repeat: 1, ease: "linear", delay: leaf.delay };
            } else if (emotion === 'angry') {
                styleOuter.left = '-15vw';
                animateInner = { 
                    x: ['-20vw', '120vw'], 
                    y: [0, leaf.sway * 4], 
                    rotate: [leaf.rotStart, leaf.rotStart + leaf.rotEnd] 
                };
                transitionInner = { duration: 4 * leaf.speed + 1.5, repeat: 1, ease: "easeIn", delay: leaf.delay / 2 };
            } else if (emotion === 'overwhelmed') {
                styleOuter.top = '-20vh';
                animateInner = { 
                    y: ['-20vh', '120vh'], 
                    x: [`${leaf.sway * 2}vw`, `${-leaf.sway * 3}vw`], 
                    rotate: [leaf.rotStart, leaf.rotStart + leaf.rotEnd] 
                };
                transitionInner = { duration: 8 * leaf.speed + 4, repeat: 1, ease: "linear", delay: leaf.delay };
            }

            return (
                <motion.div
                    className="absolute drop-shadow-sm pointer-events-none"
                    style={styleOuter}
                    initial={{ opacity: 0 }}
                    animate={{ opacity: leaf.opacity }}
                    transition={{ duration: 3, delay: leaf.delay }}
                >
                    <motion.div 
                        className="w-full h-full text-[#8BA989]"
                        initial={initialInner}
                        animate={animateInner}
                        transition={transitionInner}
                    >
                        <svg viewBox="0 0 100 100" className="w-full h-full" fill="currentColor">
                            <path d="M50 0 C80 30, 95 60, 50 100 C5 60, 20 30, 50 0 Z" />
                            <path d="M50 10 L50 90" stroke="rgba(255,255,255,0.4)" strokeWidth="3" strokeLinecap="round" fill="none" />
                        </svg>
                    </motion.div>
                </motion.div>
            );
        };

        const LeavesSystem = ({ emotion }) => {
            // Increased density to emphasize the rich organic physics
            const numLeaves = emotion === 'overwhelmed' ? 50 : emotion === 'sad' ? 12 : emotion === 'angry' ? 20 : 8;
            const leaves = Array.from({ length: numLeaves }).map((_, i) => i);

            return (
                <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
                    {leaves.map(i => <Leaf key={`${emotion}-${i}`} index={i} emotion={emotion} />)}
                </div>
            );
        };

        // CINEMATIC INTRO TEXT
        const IntroText = () => (
            <div className="flex flex-col items-center justify-center w-full h-full pointer-events-none z-10 px-8">
                <motion.h1 
                    initial={{ opacity: 0, filter: "blur(10px)" }}
                    animate={{ opacity: 0.7, filter: "blur(0px)" }}
                    transition={{ duration: 4, ease: "easeOut" }}
                    className="text-4xl md:text-5xl font-light tracking-wide text-[#8B7E9A] text-left w-full max-w-2xl"
                >
                    i don't know....
                </motion.h1>
                <motion.h1 
                    initial={{ opacity: 0, filter: "blur(10px)" }}
                    animate={{ opacity: 0.7, filter: "blur(0px)" }}
                    transition={{ duration: 4, delay: 3, ease: "easeOut" }}
                    className="text-4xl md:text-5xl font-light tracking-wide text-[#8B7E9A] text-right mt-6 w-full max-w-2xl"
                >
                    ....what to say.
                </motion.h1>
            </div>
        );

        // CHAT INTERFACE: Zero hard lines
        const ChatFlow = ({ apiKey }) => {
            const { setVolume } = useContext(MeiContext);
            const [input, setInput] = useState('');
            const [messages, setMessages] = useState([]);
            const [loading, setLoading] = useState(false);
            const chatEndRef = React.useRef(null);

            const systemInstruction = {
                "role": "user",
                "parts": [{ "text": "System Instruction: You are Mei, a bicultural pediatric counselor in Greenpoint. You run 'I Don't Know What To Say'. You are calm, friendly, grounded. Never be hyper. Keep responses to 1-2 soft sentences." }]
            };
            const systemAck = { "role": "model", "parts": [{ "text": "Understood. I am Mei. I am listening softly." }] };

            useEffect(() => {
                setMessages([
                    { role: 'model', text: "How are you feeling today?" }
                ]);
            }, []);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const handleSend = async (e) => {
                e.preventDefault();
                if (!input.trim() || !apiKey) return;
                
                const userText = input.trim();
                setInput('');
                
                // 1. Push User message to UI state immediately
                setMessages(prev => [...prev, { role: 'user', text: userText }]);
                
                // 2. Trigger Affective NLP Leaves Engine
                setVolume(analyzeSentiment(userText));
                setLoading(true);

                // 3. Format strictly alternating API History for Gemini
                const rawMessages = [...messages, { role: 'user', text: userText }];
                const apiHistory = [];
                
                rawMessages.forEach(m => {
                    const mappedRole = m.role === 'user' ? 'user' : 'model';
                    if (apiHistory.length > 0 && apiHistory[apiHistory.length - 1].role === mappedRole) {
                        apiHistory[apiHistory.length - 1].parts[0].text += "\n\n" + m.text;
                    } else {
                        apiHistory.push({ role: mappedRole, parts: [{ text: m.text }] });
                    }
                });

                if (apiHistory.length > 0 && apiHistory[0].role === 'model') {
                    apiHistory.unshift({ role: 'user', parts: [{ text: "(User enters the clearing silently)" }] });
                }

                try {
                    const systemPrompt = `You are Mei, a compassionate and grounded bicultural pediatric counselor running "I Don't Know What To Say" in Greenpoint. 
Your role is to listen deeply and hold space without forcing solutions. 
CORE RULES:
1. EXTREME BREVITY: Respond with ONLY 1 short, profoundly thoughtful sentence. Never exceed 2 sentences.
2. TONE: Calm, poetic but simple, and gentle. Zero clinical language. Zero exclamation marks. Never try to "fix" the problem. 
3. FORMAT: No lists, no questions unless gently inviting reflection. Just reflect their feelings back softly.`;

                    // Unshift system prompt directly into the first user message so legacy gemini-pro interprets it flawlessly
                    apiHistory[0].parts[0].text = `[SYSTEM INIT: ${systemPrompt}]\n\nAction: ${apiHistory[0].parts[0].text}`;

                    // FIX: Using gemini-pro (1.0 tier) as it is universally supported on all free-tier API keys globally
                    const fetchUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`;
                    const res = await fetch(fetchUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            contents: apiHistory, 
                            generationConfig: { temperature: 0.4, maxOutputTokens: 100 } 
                        })
                    });
                    
                    const data = await res.json();
                    
                    if (!res.ok) {
                        throw new Error(`API: ${data.error?.message || res.status}`);
                    }
                    
                    if(data.candidates && data.candidates.length > 0) {
                        const reply = data.candidates[0].content.parts[0].text;
                        setMessages(prev => [...prev, { role: 'model', text: reply }]);
                    }
                } catch (err) {
                    console.error("Mei API Error:", err);
                    setMessages(prev => [...prev, { role: 'model', text: `(System Note) I am having trouble connecting: ${err.message}` }]);
                }
                setLoading(false);
            };

            return (
                <div className="w-full max-w-3xl h-full flex flex-col z-10 px-8 drop-shadow-sm pt-[15vh] pb-8">
                    <div className="flex-1 overflow-y-auto w-full no-scrollbar px-2 space-y-12 flex flex-col">
                        {messages.map((m, i) => (
                            <motion.div 
                                key={i}
                                initial={{ opacity: 0, y: 15 }}
                                animate={{ opacity: 1, y: 0 }}
                                transition={{ duration: 1.5, ease: 'easeOut' }}
                                className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}
                            >
                                <p className={`max-w-[85%] leading-relaxed tracking-wide ${m.role === 'user' ? 'text-xl md:text-2xl text-[#6B627A] italic text-right opacity-80' : 'text-3xl md:text-5xl text-[#5C5470] font-light text-left'}`}>
                                    {m.text}
                                </p>
                            </motion.div>
                        ))}
                        {loading && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="text-[#8B7E9A] text-xl font-light italic text-right opacity-70">mei is listening...</motion.div>
                        )}
                        {/* Huge block to push text far up past the boundary when scrollIntoView runs */}
                        <div ref={chatEndRef} className="h-32 shrink-0" />
                    </div>
                    
                    <form onSubmit={handleSend} className="relative mt-8 mb-4">
                        <input 
                            type="text" 
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            placeholder="Type gently here..." 
                            className="w-full bg-white/40 backdrop-blur-md text-[#5C5470] placeholder-[#8B7E9A]/50 px-8 py-5 rounded-[40px] outline-none focus:bg-white/60 transition-all duration-500 font-light text-2xl shadow-sm border border-white/30"
                        />
                    </form>
                    <style>{`
                        .no-scrollbar::-webkit-scrollbar { display: none; }
                        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
                        /* Soft radial mask to prevent hard clipping at the absolute top of the screen */
                        .mask-edges { mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent); -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 100%); }
                    `}</style>
                </div>
            );
        };

        // 2. THE LANDING CLEARING SCAFFOLD
        const LandingClearing = () => {
            const { volume, setVolume } = useContext(MeiContext);
            const [interactionPhase, setInteractionPhase] = useState('scaffold');
            const [apiKey, setApiKey] = useState(null);

            useEffect(() => {
                const HARDCODED_PUBLIC_KEY = "AIzaSyDF1HpI1RIFenpJochk1-tba64OZTLiiXw";
                const urlParams = new URLSearchParams(window.location.search);
                const urlKey = urlParams.get('key');
                if (urlKey) { localStorage.setItem('MEI_GEMINI_KEY', urlKey); setApiKey(urlKey); }
                else if (HARDCODED_PUBLIC_KEY.length > 10) { setApiKey(HARDCODED_PUBLIC_KEY); }
                else { setApiKey(localStorage.getItem('MEI_GEMINI_KEY')); }
            }, []);

            const triggerIntro = () => {
                if (interactionPhase === 'chat') return; // Prevent double trigger
                if(!apiKey) {
                    const key = prompt("Please enter your Gemini API Key to connect with Mei:");
                    if(key) { localStorage.setItem('MEI_GEMINI_KEY', key); setApiKey(key); }
                    else return;
                }
                setInteractionPhase('chat');
                setVolume('neutral');
            };

            const bgClass = emotionColors[volume] || '#FDFBF7';

            return (
                <motion.div 
                    animate={{ backgroundColor: bgClass }}
                    transition={{ duration: 4 }}
                    className="w-full h-screen flex flex-col items-center justify-center relative text-textSoftDark overflow-hidden select-none cursor-pointer"
                    onClick={triggerIntro}
                >
                    <DiffusedCursor />
                    <LeavesSystem emotion={volume} />

                    {interactionPhase === 'scaffold' && (
                        <IntroText />
                    )}

                    {interactionPhase === 'chat' && (
                        <div className="absolute inset-0 flex items-center justify-center pointer-events-auto cursor-default" onClick={(e) => e.stopPropagation()}>
                            <ChatFlow apiKey={apiKey} />
                        </div>
                    )}

                    {/* Background Soft Pulse */}
                    <motion.div 
                        animate={{ opacity: [0.1, 0.2, 0.1] }}
                        transition={{ duration: 10, repeat: Infinity, ease: "easeInOut" }}
                        className="absolute inset-0 pointer-events-none bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-white/30 via-transparent to-transparent z-0"
                    />
                </motion.div>
            );
        };

        const App = () => (
            <MeiProvider>
                <LandingClearing />
            </MeiProvider>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
