<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>i dont know what to say</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f6f8ee; /* Bright summer day, sunlit edge of a forest */
      overflow: hidden;
      font-family: 'Georgia', serif;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      cursor: crosshair;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  
  <script>
    // System State Architecture
    let state = 'A'; // A: Void, B: Stutter, D: Water Butterfly
    
    let stars = [];
    let bursts = [];
    let droplets = [];
    let tinyButterflies = []; // Persistent tracking for disappearing voices
    let clouds = []; // Massive Ghibli volumetric clouds
    let tapCount = 0;
    let dTimer = 0;
    let dCenter;
    
    // Obsolete flat color array replaced natively by the atmospheric drawing gradient 
    
    function setup() {
      createCanvas(windowWidth, windowHeight);
      
      // Initialize Golden floating magic spores (Spirited Away style)
      for (let i = 0; i < 120; i++) { 
        stars.push(new Star());
      }
      
      // Initialize massive drifting Ghibli cumulonimbus clouds
      for (let i = 0; i < 5; i++) {
        clouds.push(new Cloud());
      }
    }
    
    function draw() {
      // High-performance vertical linear gradient for 2D atmospheric perspective (Zenith to Forest Edge)
      let ctx = drawingContext;
      let grad = ctx.createLinearGradient(0, 0, 0, height);
      grad.addColorStop(0, '#1c5aa8');    // Deep realistic polarized sky blue
      grad.addColorStop(0.4, '#76ade3');  // Mid sky gradient
      grad.addColorStop(0.8, '#dceaf2');  // Ultra-realistic atmospheric white-blue fading horizon
      grad.addColorStop(1, '#a8c797');    // Muted realistic distant ground fusion
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, width, height);
      
      // State A: Summer Motes background drift & Clouds
      for (let c of clouds) {
        c.update();
        c.display();
      }
      
      for (let s of stars) {
        s.update();
        s.display();
      }
      
      // State Grass: Native sweeping grassfield reacting to invisible wind frames
      drawGrass();
      
      // State B: The Stutter (Bursts of points)
      for (let i = bursts.length - 1; i >= 0; i--) {
        let b = bursts[i];
        b.update();
        b.display();
      }
      
      // The Small Voices (Tiny blue butterflies fleeing over the edges)
      for (let i = tinyButterflies.length - 1; i >= 0; i--) {
        let tb = tinyButterflies[i];
        tb.update();
        tb.display();
        // Immediately kills flight trails when cinematic State D begins or when entirely off-screen
        if (tb.isDead() || state === 'D') {
            tinyButterflies.splice(i, 1);
        }
      }
      
      // State D: The Water Butterfly (Coalescence & Evaporation)
      if (state === 'D') {
        dTimer += 0.5; // Slow down everything by 50% more!
        if (dTimer < 600) {
          // Drops "sweat" from past traces coalescing into a shape
          for (let d of droplets) {
            d.update();
            d.display();
          }
        } else if (dTimer === 600 || dTimer === 600.5) {
          // Evaporation trigger
          if (dTimer === 600) {
            for (let d of droplets) {
              d.triggerEvaporate();
            }
          }
        } else if (dTimer > 600.5) {
          // Visualizing vapor evaporation
          for (let i = droplets.length - 1; i >= 0; i--) {
            let d = droplets[i];
            d.updateEvaporate();
            d.display();
            if (d.alpha <= 0) {
              droplets.splice(i, 1);
            }
          }
          
          if (droplets.length === 0) {
            // Seamlessly return to Void
            state = 'A';
            tapCount = 0;
            bursts = []; // Wipes cleanly only after butterfly evaporates
          }
        }
      }
    }
    
    function mousePressed() {
      if (state === 'D') return; // lockout interactions during cinematic finale
      
      tapCount++;
      
      if (tapCount < 15) {
        // State B: The Stutter points (requires 3 sets of 5 clicks)
        bursts.push(new Burst(mouseX, mouseY, tapCount));
      } else if (tapCount === 15) {
        // State D: Coalescence Trigger on the 15th tap
        state = 'D';
        dTimer = 0;
        initButterfly(mouseX, mouseY);
      }
    }
    
    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
    
    // --- ENVIRONMENT RENDERERS --- //
    
    function drawGrass() {
        noFill();
        let windTime = frameCount * 0.02; // Global sweeping breeze
        
        // Massive loop constructing native 2D bent vectors tracking the wind
        // Draw BACK layer (darker, shorter, dense shadow meadow)
        stroke(35, 90, 45, 180); // Deep realistic shadowed wildgrass
        strokeWeight(2.5);
        for (let x = 0; x <= width; x += 5) { 
            // Ghibli organized wind wave physically rolling across the field (sin + noise)
            let wave = sin(x * 0.006 + windTime) * 25; 
            let windBend = wave + map(noise(x * 0.02, windTime), 0, 1, -25, 25); 
            let heightVar = map(noise(x * 0.1), 0, 1, height * 0.05, height * 0.20);
            
            beginShape();
            vertex(x, height);
            quadraticVertex(x, height - heightVar * 0.6, x + windBend, height - heightVar); 
            endShape();
        }
        
        // Draw FRONT layer (brighter, taller, overlapping beautifully catching the sun)
        stroke(75, 130, 60, 200); // Realistic sunlit grass structure
        strokeWeight(3.0);
        for (let x = 0; x <= width; x += 8) { 
            let wave = sin((x+100) * 0.006 + windTime) * 35; // offset wave naturally
            let windBend = wave + map(noise((x+100) * 0.02, windTime), 0, 1, -35, 35); 
            let heightVar = map(noise((x+100) * 0.1), 0, 1, height * 0.08, height * 0.32);
            
            beginShape();
            vertex(x, height);
            quadraticVertex(x, height - heightVar * 0.6, x + windBend, height - heightVar); 
            endShape();
        }
    }
    
    // --- PHYSICS & VISUAL CLASSES --- //
    
    class Star {
      constructor() {
        this.pos = createVector(random(width), random(height));
        this.nx = random(1000);
        this.size = random(3.0, 7.0); // Bigger, softer floating magic spores/motes
      }
      update() {
        // Drifting golden motes slowly rising in the updrafts
        this.nx += 0.005;
        this.pos.x += map(noise(this.nx, frameCount * 0.01), 0, 1, -0.6, 0.6);
        this.pos.y -= random(0.3, 1.0); // Slowly rising
        if (this.pos.y < 0) this.pos.y = height + 10;
      }
      display() {
        noStroke();
        let alpha = map(noise(this.nx), 0, 1, 10, 150);
        // Hyper-realistic optical lens bokeh / spore light blooming using native radial gradients
        let ctx = drawingContext;
        let grad = ctx.createRadialGradient(this.pos.x, this.pos.y, 0, this.pos.x, this.pos.y, this.size * 3.5);
        grad.addColorStop(0, `rgba(255, 255, 255, ${alpha/255})`); // Hot white optical core
        grad.addColorStop(0.2, `rgba(255, 230, 100, ${alpha/255 * 0.8})`); // Rich warm bloom ring
        grad.addColorStop(1, `rgba(255, 200, 50, 0)`); // Perfect smooth linear fade into transparency
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.pos.x, this.pos.y, this.size * 3.5, 0, TWO_PI);
        ctx.fill();
      }
    }
    
    class Cloud {
        constructor() {
            this.pos = createVector(random(width), random(height * 0.05, height * 0.35));
            this.size = random(200, 500); // Massive epic Ghibli columns
            this.speed = random(0.1, 0.35); // Slow majestic drift
            this.opacity = random(220, 255); // Solid painted volumes
            
            // Rebuild cloud as a structural painted blob composed of crisp overlapping discs
            this.clumps = [];
            let numClumps = Math.floor(random(8, 16));
            for (let i = 0; i < numClumps; i++) {
                let rLocal = random(this.size * 0.25, this.size * 0.55);
                let ang = random(TWO_PI);
                this.clumps.push({
                   x: cos(ang) * random(0, this.size * 0.45) * 1.5, // Wider horizontally 
                   y: sin(ang) * random(0, this.size * 0.25) - (rLocal * 0.2), // Biased upward
                   r: rLocal
                });
            }
        }
        update() {
            this.pos.x += this.speed; // Drift cleanly downwind (rightwards)
            if (this.pos.x - this.size > width) {
                // Respawn cleanly upwind upon exiting right screen bounds
                this.pos.x = -this.size;
                this.pos.y = random(height * 0.05, height * 0.35);
            }
        }
        display() {
            noStroke();
            push();
            translate(this.pos.x, this.pos.y);
            let ctx = drawingContext;
            
            // Hyper-realistic volumetric clouds using overlapping incredibly soft radial gradients
            for (let c of this.clumps) {
                let rGradient = ctx.createRadialGradient(c.x, c.y - c.r*0.1, 0, c.x, c.y, c.r);
                rGradient.addColorStop(0, `rgba(255, 255, 255, ${this.opacity/255 * 0.95})`); // Bright white dense sunlit core
                rGradient.addColorStop(0.5, `rgba(240, 245, 250, ${this.opacity/255 * 0.6})`); // Mid soft volume
                rGradient.addColorStop(1, `rgba(200, 210, 220, 0)`); // Dissipating perfectly to atmospheric edges
                
                ctx.fillStyle = rGradient;
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.r, 0, TWO_PI);
                ctx.fill();
            }
            pop();
        }
    }
    
    class Burst {
        constructor(x, y, tapIndex) {
            this.origin = createVector(x, y);
            this.particles = [];
            this.timer = 0;
            this.lifeTime = random(100, 150);
            this.shapeRadius = random(80, 160);
            this.collapseThreshold = random(0.55, 0.75);
            
            let numLines = Math.floor(random(40, 80)); // rich particle burst
            
            // Intention: Utterly asymmetrical pareidolia shapes (clouds/nebulas) strictly breaking any "firework" symmetry
            let shapeSeed = random(1000);
            
            for(let i = 0; i < numLines; i++) {
                // Distribute randomly across to break generic uniform spacing
                let angle = random(TWO_PI);
                // Fundamentally fill the inner volume area, eliminating the hollow "firework ring" effect
                let baseR = random(15, this.shapeRadius); 
                
                // Pure asymmetric noise distortion clustering the dots into deep organic clouds
                let px = baseR * cos(angle);
                let py = baseR * sin(angle);
                let nVal = noise(px * 0.015 + shapeSeed, py * 0.015 + shapeSeed);
                
                // Aggressive stretching of the cloud contour
                let r = baseR * map(nVal, 0, 1, 0.1, 2.5);
                let tOffset = p5.Vector.fromAngle(angle).mult(r);
                
                let isVoiceless = random() < 0.90; // 90% of the burst dots are trapped directly in the center, voiceless
                
                this.particles.push({
                    curr: createVector(x + random(-40, 40), y + random(-40, 40)), // Specks vastly scattered and spread out
                    tOffset: tOffset,
                    seed: random(1000),
                    dissolved: false,
                    isVoiceless: isVoiceless,
                    vx: 0,
                    vy: 0,
                    alpha: 255,
                    lerpSpeed: random(0.002, 0.02) // Halved AGAIN! Extra agonizingly slow movement
                });
            }
            this.spawnedButterflies = false; // logic lock for end-state triggers
        }
        update() {
            this.timer += 0.1; // Slowed another 100%. Agonizingly slow meaning formation
            let progress = this.timer / this.lifeTime;
            
            for(let p of this.particles) {
                if (progress < this.collapseThreshold) {
                    if (p.isVoiceless) {
                        // The 90% that are trapped in silence. They just shiver nervously packed in the core point.
                        p.curr.x += random(-0.3, 0.3);
                        p.curr.y += random(-0.3, 0.3);
                        continue; // Bypass all outward expansion math entirely
                    }
                    
                    // Stutter physics: the brave 10% trying desperately to form the intended meaning
                    let target = p5.Vector.add(this.origin, p.tOffset);
                    // Uses personalized lerp speeds so the blob scrambles into place instead of expanding together
                    p.curr.x = lerp(p.curr.x, target.x, p.lerpSpeed);
                    p.curr.y = lerp(p.curr.y, target.y, p.lerpSpeed);
                    
                    // Tremor noise reflecting the 'struggle'
                    let intensity = map(progress, 0, this.collapseThreshold, 0.1, 1.5); // Tremor calmed severely
                    let tx = map(noise(p.seed, frameCount * 0.1), 0, 1, -1, 1) * intensity;
                    let ty = map(noise(p.seed + 50, frameCount * 0.1), 0, 1, -1, 1) * intensity;
                    
                    p.curr.x += tx;
                    p.curr.y += ty;
                } else if (progress < 1.0) {
                    // Dissolve / Fizzle out gently WITHOUT gravity to prevent giant grey smear artifacts
                    if (!p.dissolved) {
                        p.dissolved = true;
                        p.vx = random(-1.5, 1.5);
                        p.vy = random(-1.5, 1.5); 
                    }
                    p.curr.x += p.vx;
                    p.curr.y += p.vy;
                    // Friction to naturally halt them completely
                    p.vx *= 0.85;
                    p.vy *= 0.85;
                } else {
                    // Ghostly faintt: freezing visually permanently instead of wiping
                    p.vx = 0;
                    p.vy = 0;
                }
            }
            
            // Burst ends logic: representing attempts to say something fleeing outward
            if (progress >= 1.0 && !this.spawnedButterflies) {
                this.spawnedButterflies = true;
                let numVoices = Math.floor(random(1, 4)); // Small disappearing voices
                for(let i=0; i<numVoices; i++) {
                    let ghostOrigin = random(this.particles);
                    tinyButterflies.push(new TinyButterfly(ghostOrigin.curr.x, ghostOrigin.curr.y));
                }
            }
        }
        display() {
            let progress = this.timer / this.lifeTime;
            
            for(let p of this.particles) {
                 // Dynamic alpha scaling, deliberately capping high-end max alpha to 120 so the dots
                 // mathematically CANNOT burn a long continuous white smear-trail into the background buffer!
                 if (progress >= this.collapseThreshold && progress < 1.0) {
                       p.alpha = map(progress, this.collapseThreshold, 1.0, 120, 20);
                 } else if (progress >= 1.0) {
                       p.alpha = 20; // locked as a permanently subdued haunted ghost trace 
                 } else {
                       p.alpha = 120; // High enough to see clearly, low enough to wipe cleanly without tracing
                 }
                 
                 // Flashing discrete render trick: actively exploring dots blink rapidly so they
                 // literally draw as a broken sequence of disjointed dots. Impossible to look like a solid tracked line.
                 let isExploring = (!p.isVoiceless && progress < this.collapseThreshold);
                 if (isExploring && (frameCount % 20 < 10)) {
                     continue; // Skip the draw call 50% of the time, fragmenting the flight path entirely!
                 }
                 
                 noStroke();
                 fill(20, 55, 90, p.alpha); // Deep realistic navy specks
                 circle(p.curr.x, p.curr.y, random(3.0, 5.5)); // Specks larger and organically varied in structural scale
            }
        }
    }
    
    function initButterfly(clickX, clickY) {
        // Force the majestic butterfly to assemble perfectly centered on the screen
        let cx = width / 2;
        let cy = height / 2;
        dCenter = createVector(cx, cy);
        
        let targetCount = 600; // incredibly dense point tracing to ensure a solid contiguous outline
        let ghosts = [];
        // Harvest every single ghostly survivor from the past attempts
        for (let b of bursts) {
            for (let p of b.particles) ghosts.push(p);
        }
        
        let existingCount = ghosts.length;
        let total = Math.max(targetCount, existingCount);
        let i = 0;
        
        // Sweat droplets directly off the "lines of the past"
        for (let g of ghosts) {
            let tVal = (i / total) * 12 * PI; // perfectly distribute smoothly along the entire butterfly curve
            droplets.push(new Droplet(g.curr.x, g.curr.y, cx, cy, tVal));
            i++;
        }
        
        // If the ghosts aren't dense enough to draw the solid butterfly, spawn extra droplets scattered wildly
        // across the screen instead of a geometric box, fading them in organically to be vacuumed into the shape
        while (i < targetCount) {
            let tVal = (i / total) * 12 * PI;
            let auxX = random(0, width);
            let auxY = random(0, height);
            let d = new Droplet(auxX, auxY, cx, cy, tVal);
            d.alpha = 0; // Starts invisible
            droplets.push(d);
            i++;
        }
        
        // Critically DO NOT wipe `bursts` here. Let them persistently haunt the background!
    }
    
    class Droplet {
        constructor(sx, sy, cx, cy, tVal) {
            this.origin = createVector(cx, cy);
            this.curr = createVector(sx, sy); // starts EXACTLY where the ghost trace froze
            this.seed = random(1000);
            this.targetAlpha = random(80, 220);
            this.alpha = this.targetAlpha; // default solid, overwritable
            this.size = random(2.0, 3.5); // rigid robust dots for pure visual clarity
            
            // "Sweating" delay: it must visually grow ON the ghost trace before sliding off
            this.sweatTimer = random(50, 200); // Delayed significantly longer to watch Sweat build heavily
            
            // Pure evenly-spaced placement along Temple's Parametric Butterfly Curve
            let t = tVal; 
            let e = exp(cos(t));
            let s = pow(sin(t/12), 5);
            let x = sin(t) * (e - 2*cos(4*t) - s);
            let y = -cos(t) * (e - 2*cos(4*t) - s); // flip upright intentionally negative
            
            // Dynamically macroscopic! Perfectly sizing the butterfly to fill standard viewing ratios on both mobile & desktop
            let scaleFact = Math.min(windowWidth, windowHeight) / 9; 
            this.tOffset = createVector(x * scaleFact, y * scaleFact);
            this.vp = createVector(0,0);
        }
        update() {
            if (this.alpha < this.targetAlpha) {
                this.alpha += 1.5; // graceful fade in for invisibly spawned extra drops
            }
            if (this.sweatTimer > 0) {
                // Visually "sweating" / expanding from the ghost trace without moving yet
                this.sweatTimer--;
                this.size = map(this.sweatTimer, 200, 0, 0.5, 4.5, true);
                return; // Anchor to the trace until sweat completes
            }
            
            // Synchronous breathing so the entire butterfly pulses firmly as one recognizable structural entity
            let breath = map(sin(frameCount * 0.03), -1, 1, 0.95, 1.05); // removed this.seed
            let targetOffset = p5.Vector.mult(this.tOffset, breath);
            let target = p5.Vector.add(this.origin, targetOffset);
            
            // Starts slow and speeds up beautifully as it detaches and slides off
            let dist = p5.Vector.dist(this.curr, target);
            let force = constrain(map(dist, 0, 300, 0.003, 0.03), 0.003, 0.03); // Halved movement speed
            
            this.curr.x = lerp(this.curr.x, target.x, force);
            this.curr.y = lerp(this.curr.y, target.y, force);
            
            // Taoist Fluidity non-resistant offset
            this.curr.x += map(noise(this.seed, frameCount * 0.01), 0, 1, -1, 1);
            this.curr.y += map(noise(this.seed + 200, frameCount * 0.01), 0, 1, -1, 1);
        }
        display() {
            noStroke();
            fill(15, 45, 90, this.alpha); // Deep indigo/azure silhouettes standing against the golden light
            circle(this.curr.x, this.curr.y, this.size);
        }
        triggerEvaporate() {
            // Initiate gentle phase transition from fluid to vapor
            let angle = random(TWO_PI);
            let force = random(0.2, 1.0); // much weaker scatter
            this.vp = p5.Vector.fromAngle(angle).mult(force);
            this.vp.y -= random(0.5, 1.5); // weak upward pull
        }
        updateEvaporate() {
            this.curr.add(this.vp);
            this.vp.y -= 0.015; // slow drift upward instead of rushing
            this.curr.x += random(-0.2, 0.2); // softer drift
            this.curr.y += random(-0.2, 0.2);
            
            this.alpha -= 0.6; // beautiful slow fade to nothing
            this.size = lerp(this.size, 8, 0.01); // gracefully expand into thin mist
        }
    }

    class TinyButterfly {
        constructor(x, y) {
            this.pos = createVector(x, y);
            this.seed = random(1000);
            
            // Summer wind predominantly blows rightward with the clouds, so their general escape follows it!
            let targetAngle = random(-PI/2.5, PI/2.5); // Natively drifts rightward over time, occasionally upwards
            this.escapeDir = p5.Vector.fromAngle(targetAngle); 
            
            this.color = color(10, 80, 210); // Vibrant deep morpho blue bugs against bright daylight
            this.size = random(3.0, 5.0);
            
            // Behavioral Machine States
            this.actionTimer = 0;
            this.mode = 'HOVER';
            this.vel = createVector(0,0);
            
            // Explicitly tracking flight path to render dashed lines instead of biological smears
            this.history = []; 
        }
        update() {
            this.actionTimer--;
            if (this.actionTimer <= 0) {
                // Voice-Flight Metaphor State Machine Profile (Flight vs Vocal Quality)
                let r = random();
                if (r < 0.20) {
                    this.mode = 'HOVER'; // Sustained hum/murmur. High frequency, low amplitude tension.
                    this.actionTimer = random(30, 80);
                    this.vel = createVector(0, 0);
                } else if (r < 0.40) {
                    this.mode = 'GLIDE'; // Steady held note. Smooth, resonant, legato.
                    this.actionTimer = random(40, 90);
                    let wanderAngle = this.escapeDir.heading() + random(-PI/3, PI/3);
                    this.vel = p5.Vector.fromAngle(wanderAngle).mult(random(0.5, 1.2));
                } else if (r < 0.60) {
                    this.mode = 'ZIG_ZAG'; // Breathless fragments, Staccato gasps.
                    this.actionTimer = random(15, 35);
                    let erraticAngle = random(TWO_PI);
                    this.vel = p5.Vector.fromAngle(erraticAngle).mult(random(1.5, 3.5));
                } else if (r < 0.75) {
                    this.mode = 'TAKEOFF'; // Sibilant Fricative "shhh" / "f". Sudden tiny displacement.
                    this.actionTimer = random(10, 20); // very short sudden exhale
                    let dartAngle = this.escapeDir.heading() + random(-0.2, 0.2);
                    this.vel = p5.Vector.fromAngle(dartAngle).mult(random(4, 7)); // huge air displacement speed
                } else if (r < 0.90) {
                    this.mode = 'SUNNING'; // Silent Vowel "ah". Static but full of potential energy.
                    this.actionTimer = random(40, 80);
                    this.vel = createVector(0, 0); 
                } else {
                    this.mode = 'DESCENDING'; // A fading sigh, Decrescendo. Sinking.
                    this.actionTimer = random(40, 70);
                    this.vel = createVector(random(-0.5, 0.5), random(0.5, 1.5)); // sinking downward
                }
            }
            
            // Execute Flight/Voice Physical Mechanics
            let flutterX = 0;
            let flutterY = 0;
            
            if (this.mode === 'HOVER') {
                // High frequency, low amplitude tension (Monk's chant)
                flutterX = map(noise(this.seed, frameCount * 0.4), 0, 1, -0.6, 0.6); // fast noise
                flutterY = map(noise(this.seed + 100, frameCount * 0.4), 0, 1, -0.6, 0.6);
            } else if (this.mode === 'ZIG_ZAG') {
                this.pos.add(this.vel);
                // Wildly jump directions natively simulating breathless staccato
                if (frameCount % 6 === 0) this.vel.rotate(random(-PI/2, PI/2));
            } else if (this.mode === 'TAKEOFF') {
                // Sudden loud exhale displacement losing momentum rapidly
                this.pos.add(this.vel);
                this.vel.mult(0.82); // sharp heavy friction
            } else if (this.mode === 'GLIDE') {
                // Legato moving smoothly
                this.pos.add(this.vel);
                // Low frequency, soft drifting wave overlay
                flutterX = map(sin(frameCount * 0.05 + this.seed), -1, 1, -0.3, 0.3);
                flutterY = map(cos(frameCount * 0.05 + this.seed), -1, 1, -0.3, 0.3);
            } else if (this.mode === 'DESCENDING') {
                this.pos.add(this.vel);
                this.vel.y += 0.04; // faint gravity pull sighing downward
            } else if (this.mode === 'SUNNING') {
                // Almost perfectly static, just resting
                flutterX = map(noise(this.seed, frameCount * 0.01), 0, 1, -0.1, 0.1); 
                flutterY = map(noise(this.seed + 100, frameCount * 0.01), 0, 1, -0.1, 0.1);
            }
            
            this.pos.x += flutterX;
            this.pos.y += flutterY;
            
            // Core ambient draft eventually pulling them away to escape the page natively
            if (this.mode !== 'DESCENDING') {
                this.pos.add(p5.Vector.mult(this.escapeDir, 0.15));
            }
            
            // Push isolated exact coordinates occasionally to form a strict dotted flight map (not a continuous smear)
            if (frameCount % 4 === 0) {
                this.history.push(createVector(this.pos.x, this.pos.y));
                if (this.history.length > 25) {
                    this.history.shift(); // Trail drops off naturally after 25 coordinates
                }
            }
        }
        display() {
            noStroke();
            
            // Draw the structural dashed trail explicitly so it never smears like a tadpole
            for (let i = 0; i < this.history.length; i++) {
                let h = this.history[i];
                let trailAlpha = map(i, 0, this.history.length, 0, 150);
                fill(10, 80, 210, trailAlpha); // Fading deep blue trail dots
                circle(h.x, h.y, 1.2); 
            }
            
            // If ZIG_ZAG (Staccato), explicitly skip drawing frames to create "breathless fragments" visually!
            if (this.mode === 'ZIG_ZAG' && frameCount % 6 < 3) {
                return; // Defy gravity visually, drawing distinctly separated notes
            }
            
            // If DESCENDING (A fading sigh), shrink size to physically emulate decrescendo!
            let currentSize = this.size;
            if (this.mode === 'DESCENDING') {
                // Action timer shrinks towards 0; shrink visual size accordingly
                currentSize *= map(this.actionTimer, 70, 0, 1.0, 0.1, true); 
            }
            
            fill(this.color);
            push();
            translate(this.pos.x, this.pos.y);
            rotate(this.vel.heading());
            
            // Wing Flaps: "Soft rhythmic pats", "Percussive whispers"
            // Frequency of the visual wing displacement heavily dictates the audio metaphor!
            let flapSpeed = 0.3; // Glide / Descending (Legato rhythms, sighs)
            if (this.mode === 'HOVER') flapSpeed = 1.0; // Vibrate extreme high frequency
            if (this.mode === 'ZIG_ZAG') flapSpeed = 0.6; // Breathless fragment tempo
            if (this.mode === 'TAKEOFF') flapSpeed = 1.4; // Exhale, sudden violent blur
            
            let wing = map(sin(frameCount * flapSpeed + this.seed), -1, 1, 0.1, 1);
            if (this.mode === 'SUNNING') wing = 1.0; // Static, wings spread wide, resonant continuous "ah"
            
            ellipse(0, 0, currentSize, currentSize * wing);
            pop();
        }
        isDead() {
            // Only killed explicitly when fully escaped beyond screen margins
            return (this.pos.x < -100 || this.pos.x > width + 100 || this.pos.y < -100 || this.pos.y > height + 100);
        }
    }
  </script>
